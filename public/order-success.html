<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | One4Sports</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #050505; --accent: #ff2a2a; --text-main: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
        
        .container { max-width: 500px; }
        .icon-box { font-size: 80px; color: #10b981; margin-bottom: 20px; animation: bounce 1s ease infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        h1 { font-size: 40px; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; }
        p { font-size: 18px; color: #a1a1aa; margin-bottom: 30px; font-weight: 600; }
        
        .btn { background: var(--accent); color: white; padding: 18px 40px; border-radius: 50px; text-decoration: none; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; display: inline-block; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 42, 42, 0.4); }
        .success-wrapper {
    text-align: center;
    padding: 60px 20px;
    background: var(--card-bg);
    border-radius: 20px;
    max-width: 500px;
    margin: 50px auto;
    border: 1px solid var(--border-color);
}

.success-wrapper h2 {
    font-size: 28px;
    margin: 20px 0;
    color: var(--accent);
}

.btn-shop {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 30px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 700;
}
    </style>
</head>
<body>

    <div class="success-wrapper">
    <div id="lottie-animation" style="width: 200px; height: 200px; margin: 0 auto;"></div>
    
    <h2>Order Secured! 🤙</h2>
    <p>Your gear is being prepped by the squad.</p>
    <a href="index.html" class="btn-shop">Back to the Drop</a>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<script>
    var animation = lottie.loadAnimation({
        container: document.getElementById('lottie-animation'),
        renderer: 'svg',
        loop: false, // Play once so it feels like a real action
        autoplay: true,
        path: 'https://assets9.lottiefiles.com/packages/lf20_t24n8ovn.json' // A clean "Success Checkmark" animation
    });
</script>
</body>
</html>
