<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | One4Sports</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #050505; 
            --accent: #ff2a2a; 
            --text-main: #ffffff;
            --card-bg: #111111;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .success-wrapper {
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        h2 { font-size: 28px; margin: 10px 0; color: var(--accent); text-transform: uppercase; }
        p { color: #a1a1aa; font-weight: 600; margin-bottom: 25px; }
        
        .btn-shop {
            display: inline-block;
            padding: 15px 30px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-shop:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 42, 42, 0.3); }
    </style>
</head>
<body>

    <div class="success-wrapper">
        <div id="lottie-animation" style="width: 150px; height: 150px; margin: 0 auto;"></div>
        <h2>Order Secured! 🤙</h2>
        <p>Your gear is being prepped by the squad.</p>
        <a href="index.html" class="btn-shop">Back to the Drop</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <script>
        lottie.loadAnimation({
            container: document.getElementById('lottie-animation'),
            renderer: 'svg',
            loop: false,
            autoplay: true,
            path: 'https://assets9.lottiefiles.com/packages/lf20_t24n8ovn.json'
        });
    </script>
</body>
</html>
