<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | One4Sports</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #050505; --accent: #ff2a2a; --text-main: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
        
        .container { max-width: 500px; }
        .icon-box { font-size: 80px; color: #10b981; margin-bottom: 20px; animation: bounce 1s ease infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        h1 { font-size: 40px; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; }
        p { font-size: 18px; color: #a1a1aa; margin-bottom: 30px; font-weight: 600; }
        
        .btn { background: var(--accent); color: white; padding: 18px 40px; border-radius: 50px; text-decoration: none; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; display: inline-block; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 42, 42, 0.4); }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-box"><i class="fas fa-check-circle"></i></div>
        <h1>Order Confirmed!</h1>
        <p>Thanks for choosing One4Sports! Your order is being processed and you'll receive a confirmation on WhatsApp shortly.</p>
        <a href="index.html" class="btn">Back to Store</a>
    </div>

</body>
</html>
