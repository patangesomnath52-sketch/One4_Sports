<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In | One4Sports</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f6f8; --accent: #E10600; }
        body { font-family: 'Assistant', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 400px; text-align: center; border: 1px solid #e2e8f0; }
        .brand { font-size: 32px; font-weight: 900; margin-bottom: 20px; }
        .brand span { color: var(--accent); }
        .google-btn { background: #fff; border: 2px solid #e2e8f0; padding: 15px; width: 100%; font-weight: 800; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .google-btn:hover { border-color: var(--accent); background: #f8fafc; }
        #loading { display: none; margin-top: 15px; font-weight: 700; color: var(--accent); }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="brand">One4<span>Sports</span></div>
    <h2>Welcome Back</h2>
    <p style="color: #64748b; margin: 10px 0 20px;">Sign in to continue to your account</p>
    
    <button id="google-btn" class="google-btn">
        <i class="fab fa-google" style="margin-right:10px;"></i> Sign in with Google
    </button>
    <div id="loading">Authenticating...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // 1. CONFIGURATION
   const firebaseConfig = {
  apiKey: "AIzaSyBxyUiyy0L_hDuWul8SrntOtYgI48IiUPQ",
  authDomain: "rj-sports-24dae.firebaseapp.com",
  projectId: "rj-sports-24dae",
  storageBucket: "rj-sports-24dae.firebasestorage.app",
  messagingSenderId: "952774877656",
  appId: "1:952774877656:web:aee2f70e14daeb07e912ad"
};

    const auth = getAuth(initializeApp(firebaseConfig));
    const provider = new GoogleAuthProvider();
    const adminEmails = ["Viratjadhav03@gmail.com", "patangesomnath52@gmail.com"];

    // 2. LOGIN LOGIC
    document.getElementById('google-btn').onclick = async () => {
        document.getElementById('loading').style.display = 'block';
        try {
            const res = await signInWithPopup(auth, provider);
            const email = res.user.email;

            // Save User Data
            localStorage.setItem('rj_loggedInUser', res.user.displayName);
            localStorage.setItem('rj_userEmail', email);

            // 3. SMART ROUTING
            if (adminEmails.includes(email)) {
                // Direct Admin Access
                window.location.href = 'admin.html';
            } else {
                // Customer Redirect
                const params = new URLSearchParams(window.location.search);
                const redirect = params.get('redirect') || 'index.html';
                window.location.href = redirect;
            }
        } catch (e) {
            alert("Error: " + e.message);
            document.getElementById('loading').style.display = 'none';
        }
    };
</script>
</body>
</html>
