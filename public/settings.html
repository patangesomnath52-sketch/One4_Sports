<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Settings | One4Sports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- IMMEDIATE THEME LOADER TO PREVENT FLASHING -->
    <script>
        if(localStorage.getItem('rj_theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>

    <style>
        /* BASE THEME (DARK MODE - Default) */
        :root { 
            --bg-color: #050505; 
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #ff2a2a; 
            --card-bg: #111111;
            --nav-bg: rgba(5, 5, 5, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --danger-bg: rgba(255, 42, 42, 0.1);
            --danger-text: #ff2a2a;
        }

        /* LIGHT MODE OVERRIDE */
        :root.light-mode {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #E10600;
            --card-bg: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --border-color: #e2e8f0;
            --danger-bg: #fee2e2;
            --danger-text: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* HEADER */
        .header { 
            background: var(--nav-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 20px 5%; 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid var(--border-color); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            transition: all 0.3s ease;
        }
        .back-btn { font-size: 20px; color: var(--text-main); text-decoration: none; margin-right: 20px; transition: 0.2s; }
        .back-btn:hover { color: var(--accent); transform: translateX(-3px); }
        .header h1 { font-size: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; }

        /* SETTINGS UI */
        .settings-container { max-width: 600px; margin: 40px auto; padding: 0 20px; width: 100%; flex: 1; }
        .section-title { font-size: 13px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px; margin-top: 30px; letter-spacing: 2px; }
        
        .settings-card { background: var(--card-bg); border-radius: 16px; padding: 0 20px; border: 1px solid var(--border-color); transition: all 0.3s ease; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border-color); }
        .setting-item:last-child { border-bottom: none; }
        
        .setting-info { display: flex; align-items: center; gap: 20px; }
        .setting-icon { width: 40px; height: 40px; border-radius: 10px; background: rgba(161, 161, 170, 0.1); display: flex; justify-content: center; align-items: center; color: var(--text-main); font-size: 18px; }
        .setting-text h3 { font-size: 16px; font-weight: 800; color: var(--text-main); margin-bottom: 4px; }
        .setting-text p { font-size: 14px; color: var(--text-muted); font-weight: 600; }

        /* CUSTOM TOGGLE SWITCH */
        .switch { position: relative; display: inline-block; width: 54px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border-color); transition: .4s; border-radius: 34px; border: 1px solid var(--border-color); }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background-color: var(--text-main); transition: .4s cubic-bezier(0.68, -0.55, 0.265, 1.55); border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        input:checked + .slider { background-color: var(--accent); border-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); background-color: white; }

        /* LOGOUT BUTTON */
        .btn-logout { width: 100%; background: var(--danger-bg); color: var(--danger-text); border: 1px solid var(--danger-text); padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 40px; transition: 0.3s; display: none; align-items: center; justify-content: center; gap: 10px; }
        .btn-logout:hover { background: var(--danger-text); color: white; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 42, 42, 0.2); }

    </style>
</head>
<body>

    <div class="header">
        <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h1>App Settings</h1>
    </div>

    <div class="settings-container">
        
        <!-- PROFILE SECTION -->
        <div class="section-title">Account Profile</div>
        <div class="settings-card">
            <div class="setting-item" id="account-info">
                <div class="setting-info">
                    <div class="setting-icon"><i class="fas fa-user"></i></div>
                    <div class="setting-text">
                        <h3 id="set-username">Not Signed In</h3>
                        <p id="set-email">Sign in to sync your orders & gear</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- PREFERENCES SECTION -->
        <div class="section-title">Preferences</div>
        <div class="settings-card">
            <div class="setting-item">
                <div class="setting-info">
                    <div class="setting-icon" id="theme-icon"><i class="fas fa-moon"></i></div>
                    <div class="setting-text">
                        <h3>Light Mode</h3>
                        <p>Switch to a brighter aesthetic</p>
                    </div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="lightModeToggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <button class="btn-logout" id="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Disconnect Account
        </button>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. THEME TOGGLE LOGIC
            const toggle = document.getElementById('lightModeToggle');
            const html = document.documentElement;
            const themeIcon = document.querySelector('#theme-icon i');
            
            // Check current status (Default is Dark, we toggle Light)
            if(localStorage.getItem('rj_theme') === 'light') {
                toggle.checked = true;
                themeIcon.className = 'fas fa-sun';
            }

            toggle.addEventListener('change', (e) => {
                if(e.target.checked) {
                    html.classList.add('light-mode');
                    localStorage.setItem('rj_theme', 'light');
                    themeIcon.className = 'fas fa-sun';
                } else {
                    html.classList.remove('light-mode');
                    localStorage.setItem('rj_theme', 'dark');
                    themeIcon.className = 'fas fa-moon';
                }
            });

            // 2. LOAD USER INFO
            const user = localStorage.getItem('rj_loggedInUser');
            const email = localStorage.getItem('rj_userEmail');
            const logoutBtn = document.getElementById('logout-btn');

            if(user) {
                document.getElementById('set-username').innerText = user;
                if(email) document.getElementById('set-email').innerText = email;
                logoutBtn.style.display = 'flex';
            }

            // 3. LOGOUT LOGIC
            logoutBtn.addEventListener('click', () => {
                if(confirm("Are you sure you want to disconnect your account?")) {
                    localStorage.removeItem('rj_loggedInUser');
                    localStorage.removeItem('rj_userEmail');
                    window.location.href = 'index.html';
                }
            });
        });
    </script>
</body>
</html>
