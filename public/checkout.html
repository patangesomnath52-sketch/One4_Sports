<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | One4Sports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>if(localStorage.getItem('rj_theme') === 'light') document.documentElement.classList.add('light-mode');</script>
    <style>
        :root { --bg-color: #050505; --text-main: #ffffff; --text-muted: #a1a1aa; --accent: #E10600; --card-bg: #111111; --border-color: rgba(255, 255, 255, 0.1); --input-bg: rgba(255,255,255,0.05); }
        :root.light-mode { --bg-color: #f8fafc; --text-main: #0f172a; --text-muted: #64748b; --accent: #E10600; --card-bg: #ffffff; --border-color: #e2e8f0; --input-bg: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        
        .header { padding: 20px 5%; border-bottom: 1px solid var(--border-color); text-align: center; }
        .header h1 { font-weight: 900; text-transform: uppercase; letter-spacing: -1px; }
        .header h1 span { color: var(--accent); }

        .checkout-container { max-width: 1000px; margin: 40px auto; padding: 0 5%; display: flex; gap: 40px; width: 100%; align-items: flex-start; }
        
        .form-section { flex: 2; background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); }
        .form-section h2 { margin-bottom: 20px; font-weight: 900; text-transform: uppercase; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        .form-group label { display: block; font-size: 13px; font-weight: 800; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        .form-control { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 10px; color: var(--text-main); font-weight: 600; font-size: 15px; outline: none; }
        .form-control:focus { border-color: var(--accent); }

        .summary-section { flex: 1; background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); position: sticky; top: 20px; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 600; color: var(--text-muted); }
        .summary-total { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color); font-size: 24px; font-weight: 900; color: var(--text-main); }
        
        .btn-pay { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 900; font-size: 16px; text-transform: uppercase; cursor: pointer; margin-top: 30px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-pay:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(225, 6, 0, 0.3); }

        #error-banner { display: none; background: rgba(225, 6, 0, 0.1); color: var(--accent); padding: 15px; border-radius: 10px; border: 1px solid var(--accent); font-weight: 800; margin-bottom: 20px; text-align: center; }

        @media (max-width: 768px) {
            .checkout-container { flex-direction: column-reverse; }
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Secure <span>Checkout</span></h1>
    </div>

    <div class="checkout-container">
        <div class="form-section">
            <div id="error-banner"></div>
            
            <h2>1. Shipping Details</h2>
            <form id="checkout-form">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Full Name</label>
                        <input type="text" id="chk-name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number (For WhatsApp Updates)</label>
                        <input type="tel" id="chk-phone" class="form-control" placeholder="+91" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="chk-email" class="form-control" required>
                    </div>
                    <div class="form-group full-width">
                        <label>Delivery Address</label>
                        <textarea id="chk-address" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="chk-city" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>PIN Code</label>
                        <input type="text" id="chk-pin" class="form-control" required>
                    </div>
                </div>

                <h2 style="margin-top: 40px;">2. Payment Method</h2>
                <div style="padding: 15px; border: 1px solid var(--accent); border-radius: 10px; background: rgba(225, 6, 0, 0.05); margin-bottom: 20px;">
                    <label style="display: flex; align-items: center; gap: 10px; font-weight: 800; cursor: pointer;">
                        <input type="radio" checked style="width: 18px; height: 18px; accent-color: var(--accent);">
                        Cash on Delivery / Pay on Store Pickup
                    </label>
                </div>

                <button type="submit" class="btn-pay" id="submit-btn"><i class="fas fa-check-circle"></i> Confirm Order & Send WhatsApp</button>
            </form>
        </div>

        <div class="summary-section">
            <h2 style="font-weight: 900; margin-bottom: 20px; text-transform: uppercase;">Order Summary</h2>
            <div id="checkout-items"></div>
            <div class="summary-total">
                <span>Total to Pay:</span>
                <span id="checkout-total">₹0</span>
            </div>
            <div style="text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-muted); font-weight: 700;">
                <i class="fas fa-shield-alt"></i> 256-bit Encrypted Checkout
            </div>
        </div>
    </div>

    <script>
        // 1. SAFE DATA LOADING
        let cart = [];
        try {
            const savedCart = localStorage.getItem('rj_cart');
            if (savedCart) cart = JSON.parse(savedCart);
            if (!Array.isArray(cart)) cart = [];
        } catch (e) {
            console.error("Cart data corrupted.");
            cart = [];
        }

        if (cart.length === 0) {
            window.location.href = 'cart.html';
        }

        // 2. RENDER SUMMARY
        let orderTotal = 0;
        let cartSummaryText = "";
        const itemsContainer = document.getElementById('checkout-items');
        
        cart.forEach(item => {
            orderTotal += (Number(item.price) * item.quantity);
            cartSummaryText += `- ${item.quantity}x ${item.name} (${item.size || 'Standard'})\n`;
            
            itemsContainer.innerHTML += `
                <div class="summary-item">
                    <span>${item.quantity}x ${item.name} <span style="font-size: 12px; opacity: 0.6;">(${item.size || 'Std'})</span></span>
                    <span>₹${(item.price * item.quantity).toLocaleString()}</span>
                </div>
            `;
        });
        document.getElementById('checkout-total').innerText = `₹${orderTotal.toLocaleString()}`;

        // 3. PRE-FILL DATA
        document.getElementById('chk-name').value = localStorage.getItem('rj_loggedInUser') || '';
        document.getElementById('chk-email').value = localStorage.getItem('rj_userEmail') || '';

        // 4. SUBMIT ORDER LOGIC (BULLETPROOFED)
        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const errorBanner = document.getElementById('error-banner');
            
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Processing...';
            btn.disabled = true;
            errorBanner.style.display = 'none';

            const customerName = document.getElementById('chk-name').value.trim();
            const phone = document.getElementById('chk-phone').value.trim();
            const email = document.getElementById('chk-email').value.trim();
            const orderId = 'ORD-' + Math.floor(10000 + Math.random() * 90000);

          const newOrder = {
    orderId: orderId,
    customer: customerName,
    total: orderTotal,
    items: cart.map(item => ({ 
        name: item.name, 
        price: item.price, 
        quantity: item.quantity, 
        size: item.size, 
        image: item.image 
    })),
    status: 'Processing',
    date: new Date().toISOString()
};

            try {
                // Send the exact JSON payload the server needs
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(newOrder)
                });

                const result = await response.json().catch(() => ({})); // Catch JSON parse errors from backend

                if (response.ok) {
                    // WhatsApp Logic
                    const storeWhatsAppNumber = "918055475552"; 
                    const waMessage = `*NEW ORDER ALERT: ${orderId}*\n\n*Customer:* ${customerName}\n*Phone:* ${phone}\n\n*Items Ordered:*\n${cartSummaryText}\n*Total to Pay:* ₹${orderTotal.toLocaleString()}\n\n*Status:* Pending COD Verification`;
                    
                    const waUrl = `https://wa.me/${storeWhatsAppNumber}?text=${encodeURIComponent(waMessage)}`;
                    
                    // Open WhatsApp in background
                    window.open(waUrl, '_blank');

                    // Clear Cart & Redirect
                    localStorage.removeItem('rj_cart');
                    window.location.href = `success.html?order=${orderId}`;
                } else {
                    // SERVER REJECTED IT
                    throw new Error(result.message || `Server Error ${response.status}`);
                }
            } catch (err) {
                // NETWORK ERROR OR SERVER CRASH
                console.error("Checkout Error:", err);
                errorBanner.innerText = `Checkout Failed: ${err.message}. Please check if the server is running.`;
                errorBanner.style.display = 'block';
                
                // Reset Button
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Confirm Order & Send WhatsApp';
            }
        });
    </script>
</body>
</html>
