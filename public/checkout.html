<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | One4Sports</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // Instantly checks the saved theme from settings
        if(localStorage.getItem('rj_theme') === 'light') {
            document.documentElement.classList.add('light-mode');
        }
    </script>
    
    <style>
        /* BASE THEME (DARK MODE - Default) */
        :root { 
            --bg-color: #050505; 
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #ff2a2a; 
            --accent-glow: rgba(255, 42, 42, 0.5);
            --card-bg: #111111;
            --nav-bg: rgba(5, 5, 5, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
        }

        /* LIGHT MODE OVERRIDE */
        :root.light-mode {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #E10600;
            --accent-glow: rgba(225, 6, 0, 0.3);
            --card-bg: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --border-color: #e2e8f0;
            --success: #059669;
            --success-bg: #dcfce7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 100px; transition: background 0.3s, color 0.3s; }

        /* GLASSMORPHIC HEADER */
        .header { background: var(--nav-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); padding: 15px 5%; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 900; text-decoration: none; color: var(--text-main); text-transform: uppercase; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .secure-badge { font-size: 12px; font-weight: 800; color: var(--success); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }

        .checkout-wrapper { max-width: 1200px; margin: 40px auto; display: flex; gap: 30px; padding: 0 5%; }
        .left-column { flex: 1.5; display: flex; flex-direction: column; gap: 20px; }
        .right-column { flex: 1; position: sticky; top: 100px; height: fit-content; }

        /* CARDS */
        .checkout-card { background: var(--card-bg); border-radius: 16px; padding: 25px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .section-title { font-size: 18px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; letter-spacing: 1px; }
        .section-title i { color: var(--accent); font-size: 20px; }

        /* FORMS */
        .form-group { margin-bottom: 15px; }
        .form-group label { font-size: 13px; font-weight: 800; display: block; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .form-input { width: 100%; padding: 16px; background: transparent; color: var(--text-main); border: 2px solid var(--border-color); border-radius: 8px; font-weight: 700; font-size: 15px; outline: none; transition: 0.3s; }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(255, 42, 42, 0.1); }
        .form-input::placeholder { color: var(--text-muted); opacity: 0.5; }

        /* PAYMENT OPTION */
        .payment-option { border: 2px solid var(--accent); background: rgba(255, 42, 42, 0.05); padding: 18px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .opt-info { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 16px; }
        .opt-info i { color: var(--accent); font-size: 24px; }
        .payment-option > i { color: var(--accent); font-size: 20px; }

        /* SUMMARY */
        .summary-items { max-height: 300px; overflow-y: auto; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); margin-bottom: 15px; }
        .s-item { display: flex; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .s-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .s-img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; background: #1a1a1a; border: 1px solid var(--border-color); }
        .s-info { flex: 1; }
        .s-name { font-weight: 800; font-size: 15px; margin-bottom: 5px; line-height: 1.2; text-transform: uppercase; }
        
        .price-row { display: flex; justify-content: space-between; font-size: 15px; margin-bottom: 12px; font-weight: 700; color: var(--text-muted); }
        .discount { color: var(--success); }
        .total-row { border-top: 1px solid var(--border-color); padding-top: 15px; margin-top: 5px; font-size: 22px; font-weight: 900; display: flex; justify-content: space-between; color: var(--text-main); }
        
        .savings-alert { background: var(--success-bg); color: var(--success); padding: 12px; border-radius: 8px; text-align: center; font-size: 14px; font-weight: 800; margin-top: 20px; border: 1px solid rgba(16, 185, 129, 0.2); }

        /* TRUST BADGES */
        .trust-badges { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .badge { font-size: 11px; font-weight: 800; text-align: center; color: var(--text-muted); flex: 1; text-transform: uppercase; letter-spacing: 1px; }
        .badge i { display: block; font-size: 20px; margin-bottom: 8px; color: var(--success); }

        /* MOBILE FOOTER */
        .mobile-footer { position: fixed; bottom: 0; width: 100%; background: var(--nav-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); padding: 20px 5%; border-top: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; z-index: 1001; }
        .footer-price { display: flex; flex-direction: column; }
        .footer-price span { font-size: 24px; font-weight: 900; color: var(--text-main); }
        .footer-price small { font-size: 12px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .btn-place-order { background: var(--accent); color: white; border: none; padding: 16px 30px; font-size: 16px; font-weight: 900; border-radius: 8px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 20px var(--accent-glow); }
        .btn-place-order:hover { transform: translateY(-2px); background: #e10600; box-shadow: 0 10px 30px var(--accent-glow); }

        /* CUSTOM CHECKBOX */
        .custom-checkbox { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; color: var(--text-main); cursor: pointer; margin-top: 10px; }
        .custom-checkbox input { accent-color: var(--accent); width: 18px; height: 18px; cursor: pointer; }

        /* TOAST */
        #toast { visibility: hidden; min-width: 280px; background: var(--card-bg); color: var(--text-main); text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 3000; left: 50%; bottom: -50px; transform: translateX(-50%); font-weight: 800; border: 1px solid var(--accent); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; box-shadow: 0 10px 30px rgba(255, 42, 42, 0.2); }
        #toast.show { visibility: visible; opacity: 1; bottom: 100px; } /* Above mobile footer */

        @media (max-width: 768px) {
            .checkout-wrapper { flex-direction: column-reverse; margin-top: 20px; }
            .right-column { position: static; }
            .mobile-footer { padding: 15px 20px; }
        }
    </style>
</head>
<body>

<header class="header">
    <a href="index.html" class="logo">One4<span>Sports</span></a>
    <div class="secure-badge"><i class="fas fa-lock"></i> 100% Secure</div>
</header>

<div class="checkout-wrapper">
    <div class="left-column">
        <section class="checkout-card">
            <div class="section-title"><i class="fas fa-id-card"></i> 1. Contact Info</div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="c-name" class="form-input" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="c-phone" class="form-input" placeholder="10-digit mobile number" maxlength="10">
            </div>
            <label class="custom-checkbox">
                <input type="checkbox" checked id="c-whatsapp"> 
                <span>Get updates on WhatsApp <i class="fab fa-whatsapp" style="color: #25D366; font-size: 16px; margin-left: 4px;"></i></span>
            </label>
        </section>

        <section class="checkout-card">
            <div class="section-title"><i class="fas fa-map-marker-alt"></i> 2. Shipping Address</div>
            <div class="form-group">
                <label>Pincode (Auto-detects City & State)</label>
                <input type="tel" id="s-pin" class="form-input" placeholder="e.g. 431001" maxlength="6" oninput="autoDetectLocation()">
            </div>
            <div class="form-group">
                <label>Address (House No, Building, Area)</label>
                <input type="text" id="s-address" class="form-input" placeholder="Enter full address">
            </div>
            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>City</label>
                    <input type="text" id="s-city" class="form-input" placeholder="City">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>State</label>
                    <input type="text" id="s-state" class="form-input" placeholder="State">
                </div>
            </div>
        </section>

        <section class="checkout-card">
            <div class="section-title"><i class="fas fa-wallet"></i> 3. Payment Method</div>
            <div class="payment-option">
                <div class="opt-info">
                    <i class="fas fa-money-bill-wave"></i>
                    <span>Cash on Delivery (COD)</span>
                </div>
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="trust-badges">
                <div class="badge"><i class="fas fa-shield-check"></i> Secure</div>
                <div class="badge"><i class="fas fa-undo"></i> 7 Days</div>
                <div class="badge"><i class="fas fa-truck-fast"></i> Fast</div>
                <div class="badge"><i class="fas fa-box-check"></i> COD</div>
            </div>
        </section>
    </div>

    <aside class="right-column">
        <div class="checkout-card">
            <div class="section-title">Order Summary</div>
            <div id="checkout-items" class="summary-items"></div>
            <div class="price-breakdown">
                <div class="price-row"><span>Subtotal</span><span id="sub-total">₹0</span></div>
                <div class="price-row discount"><span>You Saved</span><span id="saved-amt">-₹0</span></div>
                <div class="price-row"><span>Shipping</span><span style="color: var(--success);">FREE</span></div>
                <div class="total-row">
                    <span>Total</span>
                    <span id="t-final">₹0</span>
                </div>
            </div>
            <div class="savings-alert" id="savings-msg">🔥 You saved ₹0 today!</div>
        </div>
    </aside>
</div>

<div class="mobile-footer">
    <div class="footer-price">
        <span id="m-final">₹0</span>
        <small>Total Amount</small>
    </div>
    <button class="btn-place-order" onclick="placeOrder()">Place Order <i class="fas fa-arrow-right" style="margin-left: 8px;"></i></button>
</div>

<div id="toast"><i class="fas fa-exclamation-circle" style="color: var(--accent); margin-right: 8px;"></i> <span id="toast-msg">Message</span></div>

<script>
    let cartItems = [];
    let finalTotal = 0;

    document.addEventListener('DOMContentLoaded', () => {
        cartItems = JSON.parse(localStorage.getItem('rj_cart')) || [];
        if (cartItems.length === 0) {
            alert("Your bag is empty!");
            window.location.href = 'index.html';
            return;
        }
        
        // Auto-fill logged in user info
        const userName = localStorage.getItem('rj_loggedInUser');
        if(userName) {
            document.getElementById('c-name').value = userName;
        }
        
        renderSummary();
    });

    function showToast(msg) {
        const toast = document.getElementById("toast");
        document.getElementById("toast-msg").innerText = msg;
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3500);
    }

    function renderSummary() {
        const itemsContainer = document.getElementById('checkout-items');
        let html = '';
        let actualTotal = 0;
        let mrpTotal = 0;

        cartItems.forEach(item => {
            const price = parseFloat(item.price);
            const mrp = Math.round(price * 1.4); 
            const qty = item.quantity || 1;
            
            actualTotal += (price * qty);
            mrpTotal += (mrp * qty);
            
            // Fallback for dark mode images
            const imgUrl = item.image || 'https://via.placeholder.com/300x300/111111/ffffff?text=Image';

            html += `
                <div class="s-item">
                    <img src="${imgUrl}" class="s-img" onerror="this.src='https://via.placeholder.com/300x300/111111/ffffff?text=Image'">
                    <div class="s-info">
                        <div class="s-name">${item.name}</div>
                        <div style="font-size:13px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px;">Variant: ${item.size || 'Standard'} | Qty: ${qty}</div>
                        <div style="font-weight:900; color: var(--text-main);">₹${price.toLocaleString()}</div>
                    </div>
                </div>`;
        });

        const savings = mrpTotal - actualTotal;
        finalTotal = actualTotal;

        itemsContainer.innerHTML = html;
        document.getElementById('sub-total').innerText = `₹${mrpTotal.toLocaleString()}`;
        document.getElementById('saved-amt').innerText = `-₹${savings.toLocaleString()}`;
        document.getElementById('t-final').innerText = `₹${actualTotal.toLocaleString()}`;
        document.getElementById('m-final').innerText = `₹${actualTotal.toLocaleString()}`;
        document.getElementById('savings-msg').innerText = `🔥 You saved ₹${savings.toLocaleString()} today!`;
    }

    // 🔴 EXACT PINCODE API LOGIC (Untouched)
    async function autoDetectLocation() {
        const pinInput = document.getElementById('s-pin');
        const cityInput = document.getElementById('s-city');
        const stateInput = document.getElementById('s-state');
        
        let pincode = pinInput.value.replace(/[^0-9]/g, '');
        pinInput.value = pincode;

        if (pincode.length === 6) {
            cityInput.value = "Detecting...";
            stateInput.value = "Detecting...";
            
            try {
                const response = await fetch(`https://api.postalpincode.in/postoffice/${pincode}`);
                const data = await response.json();

                if (data && data[0] && data[0].Status === "Success" && data[0].PostOffice && data[0].PostOffice.length > 0) {
                    const postOffice = data[0].PostOffice[0];
                    
                    let detectedCity = postOffice.District;
                    if (!detectedCity || detectedCity === "NA") {
                        detectedCity = postOffice.Block || postOffice.Region || postOffice.Name;
                    }
                    
                    cityInput.value = detectedCity;
                    stateInput.value = postOffice.State;
                    
                    pinInput.style.borderColor = "var(--success)";
                    cityInput.style.borderColor = "var(--success)";
                    stateInput.style.borderColor = "var(--success)";
                } else {
                    throw new Error("Invalid Pincode");
                }
            } catch (error) {
                console.error("API Error:", error);
                cityInput.value = "";
                stateInput.value = "";
                cityInput.placeholder = "Enter City manually";
                stateInput.placeholder = "Enter State manually";
                pinInput.style.borderColor = "var(--accent)";
                showToast("Pincode not found. Please type City manually.");
            }
        } else {
            pinInput.style.borderColor = "var(--border-color)";
            cityInput.style.borderColor = "var(--border-color)";
            stateInput.style.borderColor = "var(--border-color)";
            if(cityInput.value === "Detecting...") {
                cityInput.value = "";
                stateInput.value = "";
            }
        }
    }

    // WhatsApp logic (Untouched text)
    async function placeOrder() {
    const name = document.getElementById('c-name').value.trim();
    const phone = document.getElementById('c-phone').value.trim();
    const address = document.getElementById('s-address').value.trim();
    const city = document.getElementById('s-city').value.trim();
    const state = document.getElementById('s-state').value.trim();
    const pin = document.getElementById('s-pin').value.trim();

    // 1. Basic Validation
    if (!name || phone.length !== 10 || !address || !city || !state || !pin) {
        showToast("Please fill all contact and address details!");
        return;
    }

    // 2. Prepare Data
    const orderId = 'RJ' + Math.floor(Math.random() * 1000000);
    const itemsSummary = cartItems.map(i => `${i.name} (UK${i.size}) x${i.quantity}`).join(', ');
    
    // 3. Create WhatsApp URL
    const waMsg = encodeURIComponent(
        `🔥 *नवीन ऑर्डर (One4Sports)*\n\n` +
        `🆔 ID: #${orderId}\n` +
        `👤 ग्राहक: ${name}\n` +
        `📞 फोन: ${phone}\n` +
        `📍 पत्ता: ${address}, ${city}, ${state} - ${pin}\n` +
        `🛒 वस्तू: ${itemsSummary}\n` +
        `💰 एकूण: ₹${finalTotal.toLocaleString()}\n` +
        `💳 पेमेंट: Cash on Delivery\n\n` +
        `_कृपया ऑर्डर कन्फर्म करा!_`
    );

    // 4. Trigger WhatsApp in a new tab
    window.open(`https://wa.me/918055475552?text=${waMsg}`, '_blank');

    // 5. Success Flow: Clear cart and redirect
    showToast("Opening WhatsApp to confirm...");
    
    setTimeout(() => {
        localStorage.removeItem('rj_cart');
        window.location.href = 'order-success.html';
    }, 1500); // Gives the user 1.5 seconds to see the toast before leaving
}
        
  
</script>
</body>
</html>
