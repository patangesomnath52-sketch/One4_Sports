<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Track Order | One4Sports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #f4f6f8; --text-color: #0f172a; --card-bg: #ffffff; --accent: #E10600; --border-color: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); color: var(--text-color); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .track-card { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center; border: 1px solid var(--border-color); }
        h1 { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
        p { color: #64748b; font-weight: 600; margin-bottom: 25px; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 15px; border: 2px solid var(--border-color); border-radius: 8px; font-size: 16px; font-weight: bold; outline: none; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: 800; cursor: pointer; }
        
        #result-box { display: none; margin-top: 25px; text-align: left; padding: 20px; background: #f8fafc; border-radius: 8px; border: 1px solid var(--border-color); }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-weight: 800; font-size: 12px; margin-top: 10px; text-transform: uppercase; }
        .status-Pending { background: #fef08a; color: #854d0e; }
        .status-Shipped { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<div class="track-card">
    <h1>Track Order</h1>
    <p>Enter your Order ID (e.g., ORD-12345)</p>
    <div class="input-group">
        <input type="text" id="orderId" placeholder="Order ID">
        <button onclick="fetchTracking()">Track</button>
    </div>
    <div id="result-box">
        <div style="font-size: 14px; font-weight: bold;">Status: <span id="status" class="status-badge"></span></div>
        <div style="margin-top: 10px;">Customer: <span id="customer-name"></span></div>
    </div>
    <div id="error-msg" style="color:var(--accent); font-weight:bold; display:none; margin-top:15px;">Order not found.</div>
</div>

<script>
    async function fetchTracking() {
        const id = document.getElementById('orderId').value;
        const resBox = document.getElementById('result-box');
        const errBox = document.getElementById('error-msg');
        
        try {
            const res = await fetch(`/api/orders/${id}`);
            const data = await res.json();
            
            if(data.success) {
                document.getElementById('status').innerText = data.order.status;
                document.getElementById('status').className = `status-badge status-${data.order.status}`;
                document.getElementById('customer-name').innerText = data.order.customer;
                resBox.style.display = 'block';
                errBox.style.display = 'none';
            } else {
                errBox.style.display = 'block';
                resBox.style.display = 'none';
            }
        } catch(e) {
            alert("Error connecting to server.");
        }
    }
</script>
</body>
</html>
