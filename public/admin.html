<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Owner Console | One4Sports</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-color: #050505; 
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #E10600; 
            --accent-glow: rgba(225, 6, 0, 0.5);
            --card-bg: #111111;
            --nav-bg: rgba(5, 5, 5, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #login-screen { position: fixed; inset: 0; background: var(--bg-color); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px; background-image: radial-gradient(circle at 50% 0%, var(--accent-glow) 0px, transparent 50%); }
        .login-box { background: var(--card-bg); backdrop-filter: blur(16px); padding: 40px; border-radius: 24px; border: 1px solid var(--border-color); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .login-logo { font-size: 36px; font-weight: 900; margin-bottom: 5px; color: var(--text-main); letter-spacing: -1px; text-transform: uppercase; }
        .login-logo span { color: var(--accent); }
        .login-subtitle { color: var(--text-muted); margin-bottom: 30px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; }
        .login-input { width: 100%; padding: 18px; background: rgba(128,128,128,0.05); border: 2px solid var(--border-color); border-radius: 12px; font-size: 18px; margin-bottom: 20px; text-align: center; font-weight: 900; letter-spacing: 8px; color: var(--text-main); transition: 0.3s; outline: none; }
        .login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }
        .login-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 20px var(--accent-glow); }
        .login-btn:hover { background: #b90500; transform: translateY(-2px); box-shadow: 0 10px 30px var(--accent-glow); }
        .error-msg { color: var(--danger); font-weight: 800; font-size: 14px; margin-bottom: 15px; display: none; background: rgba(239, 68, 68, 0.1); padding: 12px; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2); }
        #app-content { display: none; flex-direction: column; height: 100vh; }
        .top-navbar { background: var(--nav-bg); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-color); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 2000; }
        .nav-brand { display: flex; align-items: center; gap: 15px; }
        .mobile-menu-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 14px; color: var(--text-main); font-size: 18px; cursor: pointer; display: none; transition: 0.2s; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; color: var(--text-main); text-transform: uppercase; }
        .logo span { color: var(--accent); }
        .logout-btn { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid transparent; padding: 10px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        .sidebar { width: 260px; background: var(--card-bg); border-right: 1px solid var(--border-color); padding-top: 30px; z-index: 1000; transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
        .sidebar-menu-title { padding: 0 25px 15px; color: var(--text-muted); font-size: 12px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .nav-item { padding: 16px 25px; cursor: pointer; border-left: 4px solid transparent; font-weight: 700; font-size: 15px; color: var(--text-muted); transition: all 0.3s; display: flex; align-items: center; gap: 15px; }
        .nav-item i { font-size: 18px; width: 24px; text-align: center; }
        .nav-item.active { background: var(--accent-glow); color: var(--accent); border-left-color: var(--accent); }
        .content { flex: 1; padding: 40px; overflow-y: auto; background: var(--bg-color); }
        .admin-section { display: none; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .admin-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .section-header h2 { font-size: 32px; color: var(--text-main); font-weight: 900; letter-spacing: -1px; text-transform: uppercase; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .kpi-card { background: var(--card-bg); padding: 25px; border-radius: 16px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 20px; }
        .kpi-icon { width: 60px; height: 60px; border-radius: 16px; display: flex; justify-content: center; align-items: center; font-size: 24px; }
        .kpi-data h4 { color: var(--text-muted); font-size: 13px; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-data h3 { font-size: 28px; color: var(--text-main); font-weight: 900; line-height: 1; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid var(--border-color); }
        .card h3 { margin-bottom: 25px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; font-size: 18px; }
        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: rgba(128,128,128,0.05); padding: 18px; text-align: left; font-weight: 800; border-bottom: 2px solid var(--border-color); color: var(--text-muted); text-transform: uppercase; font-size: 12px; }
        td { padding: 18px; border-bottom: 1px solid var(--border-color); font-weight: 600; font-size: 15px; }
        .status-select { padding: 10px; border-radius: 8px; border: 2px solid var(--border-color); font-weight: 800; background: var(--card-bg); color: var(--text-main); width: 100%; max-width: 150px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-group.full-width { grid-column: span 2; }
        label { display: block; font-weight: 800; margin-bottom: 10px; color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .form-control { width: 100%; padding: 16px; border: 2px solid var(--border-color); border-radius: 12px; font-weight: 700; font-size: 15px; outline: none; background: transparent; color: var(--text-main); }
        .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }
        .form-control option { background: var(--card-bg); color: var(--text-main); }
        textarea.form-control { resize: vertical; min-height: 120px; }
        .btn-action { background: var(--text-main); color: var(--bg-color); border: none; padding: 18px; border-radius: 12px; font-weight: 900; width: 100%; cursor: pointer; font-size: 16px; display: flex; justify-content: center; align-items: center; gap: 10px; text-transform: uppercase; transition: 0.3s; }
        .btn-action:hover { background: var(--accent); color: white; transform: translateY(-2px); }
        .btn-action.secondary { background: var(--text-muted); color: var(--bg-color); }
        .btn-action.secondary:hover { background: var(--accent); color: white; }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .product-img { width: 100%; height: 250px; object-fit: cover; border-bottom: 1px solid var(--border-color); }
        .product-details { padding: 25px; flex: 1; display: flex; flex-direction: column; }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid transparent; padding: 15px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; margin-top: auto; display: flex; justify-content: center; align-items: center; gap: 10px; text-transform: uppercase; font-size: 14px; transition: 0.3s; }
        .btn-delete:hover { background: var(--danger); color: white; }
        #toast { visibility: hidden; min-width: 300px; background: var(--card-bg); color: var(--text-main); text-align: center; border-radius: 12px; padding: 18px; position: fixed; z-index: 10000; left: 50%; bottom: -50px; transform: translateX(-50%); font-weight: 800; opacity: 0; transition: 0.4s; border: 1px solid var(--border-color); }
        #toast.show { visibility: visible; opacity: 1; bottom: 40px; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 900; }
        .size-grid { display: flex; flex-wrap: wrap; gap: 12px; padding: 16px; border-radius: 16px; margin: 10px 0; border: 1px solid var(--border-color); }
        .size-item { display: flex; align-items: center; gap: 8px; background: var(--card-bg); padding: 6px 14px; border-radius: 40px; border: 1px solid var(--border-color); }
        .size-item.disabled { opacity: 0.4; pointer-events: none; }
        .image-gallery { display: flex; flex-wrap: wrap; gap: 12px; margin: 16px 0; }
        .image-card { position: relative; width: 80px; height: 80px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); }
        .image-card img { width: 100%; height: 100%; object-fit: cover; }
        .delete-img { position: absolute; top: 4px; right: 4px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            .sidebar { position: absolute; left: -100%; top: 0; height: 100%; }
            .sidebar.active { left: 0; }
            .mobile-menu-btn { display: block; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="login-logo">One4<span>Sports</span></div>
        <p class="login-subtitle">Owner Management Console</p>
        <div class="error-msg" id="login-error"><i class="fas fa-shield-alt"></i> Invalid PIN.</div>
        <input type="password" id="admin-pin" class="login-input" placeholder="••••••••" autocomplete="new-password">
        <button class="login-btn" id="loginBtn">Authorize <i class="fas fa-lock" style="margin-left: 8px;"></i></button>
    </div>
</div>

<div id="app-content">
    <header class="top-navbar">
        <div class="nav-brand">
            <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <div class="logo">One4<span>Sports</span></div>
        </div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-power-off"></i> <span>Logout</span></button>
    </header>

    <div class="main-container">
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-menu-title">Main Menu</div>
            <div class="nav-item active" onclick="switchTab('dashboard', this)"><i class="fas fa-chart-line"></i> Command Center</div>
            <div class="nav-item" onclick="switchTab('inventory', this)"><i class="fas fa-box-open"></i> Inventory</div>
            <div class="nav-item" onclick="switchTab('upload', this)"><i class="fas fa-plus-circle"></i> Add Product</div>
            <div class="nav-item" onclick="switchTab('editor', this)"><i class="fas fa-pen-square"></i> Edit Product</div>
        </aside>

        <main class="content">
            <!-- DASHBOARD -->
            <div id="sec-dashboard" class="admin-section active">
                <div class="section-header">
                    <h2>Command Center</h2>
                    <button class="btn-action" style="width: auto; padding: 12px 24px; font-size: 14px;" onclick="fetchDashboardData()"><i class="fas fa-sync-alt"></i> Sync Data</button>
                </div>
                <div class="kpi-grid">
                    <div class="kpi-card"><div class="kpi-icon" style="color: #10b981; background: rgba(16, 185, 129, 0.1);"><i class="fas fa-wallet"></i></div><div class="kpi-data"><h4>Total Volume</h4><h3 id="kpi-revenue">₹0</h3></div></div>
                    <div class="kpi-card"><div class="kpi-icon" style="color: #3b82f6; background: rgba(59, 130, 246, 0.1);"><i class="fas fa-shopping-cart"></i></div><div class="kpi-data"><h4>Total Orders</h4><h3 id="kpi-orders">0</h3></div></div>
                    <div class="kpi-card"><div class="kpi-icon" style="color: #f59e0b; background: rgba(245, 158, 11, 0.1);"><i class="fas fa-clock"></i></div><div class="kpi-data"><h4>Pending</h4><h3 id="kpi-pending">0</h3></div></div>
                </div>
                <div class="card">
                    <h3>Recent Orders</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead><tr><th>Order ID</th><th>Customer</th><th>Date</th><th>Amount</th><th>Status</th></tr></thead>
                            <tbody id="order-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- INVENTORY -->
            <div id="sec-inventory" class="admin-section">
                <div class="section-header"><h2>Inventory Grid</h2></div>
                <div class="inventory-grid" id="inventory-list"></div>
            </div>

            <!-- ADD PRODUCT -->
            <div id="sec-upload" class="admin-section">
                <div class="section-header"><h2>Deploy New Product</h2></div>
                <div class="card" style="max-width: 800px;">
                    <form id="uploadForm">
                        <div class="form-grid">
                            <div class="form-group"><label>Product ID (SKU)</label><input type="text" id="p-id" class="form-control" placeholder="e.g. DROP-01" required></div>
                            <div class="form-group"><label>Category</label>
                                <select id="p-category" class="form-control" onchange="renderNewProductSizes(this.value)">
                                    <option value="Cricket">Cricket Equipment</option>
                                    <option value="Footwear">Footwear</option>
                                    <option value="Apparel">Apparel</option>
                                    <option value="Accessories">Accessories</option>
                                </select>
                            </div>
                            <div class="form-group full-width"><label>Product Title</label><input type="text" id="p-name" class="form-control" placeholder="Product Name" required></div>
                            <div class="form-group full-width"><label>Description</label><textarea id="p-desc" class="form-control" placeholder="Details..." required></textarea></div>
                            <div class="form-group"><label>Price (₹)</label><input type="number" id="p-price" class="form-control" placeholder="0" required></div>
                            <div class="form-group"><label>Stock Count</label><input type="number" id="p-stock" class="form-control" placeholder="Total units" required></div>
                            <div class="form-group full-width">
                                <label>Sizes Available (Check all that apply)</label>
                                <div class="size-grid" id="new-product-sizes"></div>
                            </div>
                            <div class="form-group full-width"><label>Visual Assets (Max 3 Images)</label><input type="file" id="p-images" class="form-control" style="padding: 12px;" multiple accept="image/*" required></div>
                        </div>
                        <button type="submit" id="uploadBtn" class="btn-action" style="margin-top: 20px;"><i class="fas fa-rocket"></i> Deploy to Storefront</button>
                    </form>
                </div>
            </div>

            <!-- EDIT PRODUCT -->
            <div id="sec-editor" class="admin-section">
                <div class="card" style="max-width: 800px;">
                    <h2><i class="fas fa-edit"></i> Edit Product</h2>
                    <div class="form-group" style="margin-top: 20px;">
                        <label>Select product to edit:</label>
                        <select id="product-search" class="form-control" style="margin-bottom: 8px;"><option value="">-- Load product list --</option></select>
                        <button id="load-product-btn" class="btn-action secondary"><i class="fas fa-box"></i> Load Selected</button>
                    </div>
                    <div id="edit-panel" style="display: none; border-top: 1px solid var(--border-color); padding-top: 20px; margin-top: 20px;">
                        <input type="hidden" id="edit-product-id">
                        <div class="form-group"><label>Product Name</label><input type="text" id="edit-product-name" class="form-control"></div>
                        <div class="form-group"><label>Price (₹)</label><input type="number" id="edit-product-price" class="form-control"></div>
                        <div class="form-group"><label>Category</label><input type="text" id="edit-product-category" class="form-control"></div>
                        <label style="display: flex; align-items: center; gap: 12px; cursor: pointer; margin: 20px 0;">
                            <input type="checkbox" id="edit-soldout-toggle" style="width: 20px; height: 20px;"> 
                            <span style="font-weight: 900; color: var(--danger);">🚫 Mark Entire Product as Sold Out</span>
                        </label>
                        <label>📏 Size Availability (check = in stock)</label>
                        <div class="size-grid" id="edit-size-list"></div>
                        <label>🖼️ Current Images</label>
                        <div id="edit-image-gallery" class="image-gallery"></div>
                        <label>➕ Add more photos (Max 3 total)</label>
                        <input type="file" id="edit-new-images" class="form-control" accept="image/*" multiple>
                        <div style="display: flex; gap: 12px; margin-top: 30px;">
                            <button id="save-product-btn" class="btn-action" style="background: var(--success); color: white;"><i class="fas fa-save"></i> Save Changes</button>
                            <button id="delete-product-editor-btn" class="btn-delete" style="margin-top:0;"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div id="toast"><i class="fas fa-info-circle"></i> <span id="toast-msg">Notification</span></div>

<script>
// ================================================================
// 1. GLOBAL UTILITIES & AUTH
// ================================================================
const ADMIN_PIN = "ONE42024";

function showToast(message, isError = false) {
    const toast = document.getElementById("toast");
    toast.style.borderColor = isError ? 'var(--danger)' : 'var(--accent)';
    document.getElementById("toast-msg").innerText = message;
    toast.className = "show";
    setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3500);
}

document.getElementById('loginBtn').addEventListener('click', () => {
    const input = document.getElementById('admin-pin').value;
    if(input === ADMIN_PIN) {
        sessionStorage.setItem('one4_admin_auth', 'true');
        unlockDashboard();
    } else {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('admin-pin').value = '';
    }
});

if(sessionStorage.getItem('one4_admin_auth') === 'true') { unlockDashboard(); }

function unlockDashboard() { 
    document.getElementById('login-screen').style.display = 'none'; 
    document.getElementById('app-content').style.display = 'flex'; 
    fetchDashboardData(); 
    renderNewProductSizes("Cricket");
}

function logout() { sessionStorage.removeItem('one4_admin_auth'); location.reload(); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.querySelector('.sidebar-overlay').classList.toggle('active'); }

function switchTab(id, el) {
    document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('sec-'+id).classList.add('active');
    el.classList.add('active');
    if(window.innerWidth <= 768) toggleSidebar();
    if(id === 'dashboard') fetchDashboardData();
    if(id === 'inventory') fetchInventory();
    if(id === 'editor') loadProductListForDropdown();
}

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }

function resizeImage(file, maxWidth = 600, maxHeight = 600, quality = 0.7) {
    return new Promise((resolve) => {
        if (!file) return resolve(null);
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width, height = img.height;
                if (width > height && width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
                else if (height > maxHeight) { width = (width * maxHeight) / height; height = maxHeight; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

// ================================================================
// 2. DASHBOARD
// ================================================================
async function fetchDashboardData() {
    const tableBody = document.getElementById('order-table-body');
    tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Loading...</td></tr>';
    try {
        const res = await fetch('/api/orders');
        const data = await res.json();
        if(data.success) {
            const orders = data.orders;
            let totalRev = 0, pendingCount = 0;
            orders.forEach(o => { 
                totalRev += Number(o.total); 
                if(o.status === 'Pending' || o.status === 'Processing') pendingCount++; 
            });
            document.getElementById('kpi-revenue').innerText = `₹${totalRev.toLocaleString()}`;
            document.getElementById('kpi-orders').innerText = orders.length;
            document.getElementById('kpi-pending').innerText = pendingCount;
            if(orders.length === 0) { tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No orders yet.</td></tr>'; return; }
            tableBody.innerHTML = orders.map(o => `
                <tr>
                    <td style="color: var(--accent); font-weight: bold;">#${escapeHtml(o.orderId)}</td>
                    <td>${escapeHtml(o.customer)}</td>
                    <td>${new Date(o.date).toLocaleDateString()}</td>
                    <td style="color: var(--success); font-weight: bold;">₹${Number(o.total).toLocaleString()}</td>
                    <td>
                        <select class="status-select" onchange="updateOrderStatus('${escapeHtml(o.orderId)}', this.value)">
                            ${['Pending','Processing','Shipped','Delivered','Cancelled'].map(st => `<option value="${st}" ${o.status === st ? 'selected' : ''}>${st}</option>`).join('')}
                        </select>
                    </td>
                </tr>
            `).join('');
        }
    } catch (err) {
        tableBody.innerHTML = `<tr><td colspan="5" style="color: red;">Error loading orders</td></tr>`;
    }
}

async function updateOrderStatus(orderId, newStatus) {
    try {
        const res = await fetch(`/api/orders/${orderId}/status`, { 
            method: 'PATCH', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ status: newStatus }) 
        });
        const data = await res.json();
        if(data.success) showToast(`Order updated to ${newStatus}`);
        else showToast("Failed to update status", true);
    } catch(err) { showToast("Connection Error", true); }
}

// ================================================================
// 3. INVENTORY
// ================================================================
async function fetchInventory() {
    const inventoryBox = document.getElementById('inventory-list');
    inventoryBox.innerHTML = '<div style="color: var(--text-muted);">Loading inventory...</div>';
    try {
        const res = await fetch('/api/products');
        const data = await res.json();
        if(data.success && data.products.length > 0) {
            inventoryBox.innerHTML = data.products.map(p => {
                const imgUrl = p.images && p.images.length > 0 ? p.images[0] : 'https://via.placeholder.com/400x300/111111/ffffff?text=No+Image';
                const isSoldOut = p.stockStatus === 'out-of-stock';
                return `
                <div class="product-card">
                    <img src="${imgUrl}" class="product-img" alt="${p.name}">
                    <div class="product-details">
                        <div style="color: ${isSoldOut ? 'var(--danger)' : 'var(--success)'}; font-weight: bold; font-size: 12px; margin-bottom: 8px;">${isSoldOut ? 'SOLD OUT' : 'IN STOCK'}</div>
                        <div style="font-weight: 900; font-size: 18px; margin-bottom: 8px;">${p.name}</div>
                        <div style="color: var(--text-muted); font-size: 14px; margin-bottom: 15px;">Category: ${p.category}</div>
                        <div style="color: var(--accent); font-weight: 900; font-size: 22px; margin-bottom: 15px;">₹${Number(p.price).toLocaleString()}</div>
                        <button class="btn-delete" onclick="deleteProduct('${p.productId}')"><i class="fas fa-trash-alt"></i> Delete</button>
                    </div>
                </div>`;
            }).join('');
        } else { inventoryBox.innerHTML = '<div>No products found.</div>'; }
    } catch (err) { inventoryBox.innerHTML = '<div style="color:red;">Error connecting to server.</div>'; }
}

async function deleteProduct(productId) {
    if(!confirm("Delete this product permanently?")) return;
    try {
        const res = await fetch(`/api/products/${productId}`, { method: 'DELETE' });
        const data = await res.json();
        if(data.success) { showToast("Product deleted."); fetchInventory(); }
    } catch (err) { showToast("Failed to delete.", true); }
}

// ================================================================
// 4. ADD PRODUCT
// ================================================================
function renderNewProductSizes(category) {
    const container = document.getElementById('new-product-sizes');
    let sizes = ['Standard Size'];
    if(category === 'Footwear') sizes = ['UK 6', 'UK 7', 'UK 8', 'UK 9', 'UK 10', 'UK 11'];
    if(category === 'Apparel') sizes = ['S', 'M', 'L', 'XL', 'XXL'];
    container.innerHTML = sizes.map(size => `
        <label class="size-item">
            <input type="checkbox" value="${size}" class="new-size-cb" checked>
            <span>${size}</span>
        </label>
    `).join('');
}

document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('uploadBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Deploying...'; 
    btn.disabled = true;
    try {
        const fileInput = document.getElementById('p-images');
        const base64Images = [];
        for (let i = 0; i < Math.min(fileInput.files.length, 3); i++) {
            const base64 = await resizeImage(fileInput.files[i]); 
            if(base64) base64Images.push(base64);
        }
        const selectedSizes = Array.from(document.querySelectorAll('.new-size-cb:checked')).map(cb => cb.value);
        const stockVal = parseInt(document.getElementById('p-stock').value);
        const productData = {
            productId: document.getElementById('p-id').value.trim(),
            name: document.getElementById('p-name').value.trim(),
            description: document.getElementById('p-desc').value.trim(),
            price: document.getElementById('p-price').value,
            category: document.getElementById('p-category').value,
            stockStatus: stockVal > 0 ? 'in-stock' : 'out-of-stock',
            availableSizes: selectedSizes,
            images: base64Images 
        };
        const res = await fetch('/api/products/add', { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(productData) 
        });
        const result = await res.json();
        if(result.success) { 
            showToast("Product Added!"); 
            document.getElementById('uploadForm').reset();
            renderNewProductSizes(document.getElementById('p-category').value);
            switchTab('inventory', document.querySelectorAll('.nav-item')[1]); 
            fetchInventory();
        } else { showToast(`Error: ${result.message}`, true); }
    } catch (err) { showToast("Server Connection Failed.", true); } 
    finally { btn.innerHTML = originalText; btn.disabled = false; }
});

// ================================================================
// 5. EDIT PRODUCT
// ================================================================
async function loadProductListForDropdown() {
    try {
        const res = await fetch('/api/products');
        const data = await res.json();
        const select = document.getElementById('product-search');
        select.innerHTML = '<option value="">-- Choose product --</option>';
        if(data.success) {
            data.products.forEach(p => {
                select.innerHTML += `<option value="${p.productId}">${p.productId} - ${p.name}</option>`;
            });
        }
    } catch(err) { showToast("Failed to load products", true); }
}

document.getElementById('load-product-btn').addEventListener('click', async () => {
    const id = document.getElementById('product-search').value;
    if(!id) return showToast("Select a product first", true);
    try {
        const res = await fetch(`/api/products/${id}`);
        const data = await res.json();
        if(data.success) {
            const p = data.product;
            document.getElementById('edit-product-id').value = p.productId;
            document.getElementById('edit-product-name').value = p.name;
            document.getElementById('edit-product-price').value = p.price;
            document.getElementById('edit-product-category').value = p.category;
            const isSoldOut = p.stockStatus === 'out-of-stock';
            document.getElementById('edit-soldout-toggle').checked = isSoldOut;
            // Sizes
            const allSizes = ['Standard Size', 'UK 6', 'UK 7', 'UK 8', 'UK 9', 'UK 10', 'S', 'M', 'L', 'XL', 'XXL'];
            document.getElementById('edit-size-list').innerHTML = allSizes.map(size => {
                const isChecked = p.availableSizes && p.availableSizes.includes(size) && !isSoldOut;
                return `
                <label class="size-item ${isSoldOut ? 'disabled' : ''}">
                    <input type="checkbox" value="${size}" class="edit-size-cb" ${isChecked ? 'checked' : ''} ${isSoldOut ? 'disabled' : ''}>
                    <span>${size}</span>
                </label>`;
            }).join('');
            // Images
            window._currentEditImages = p.images || [];
            renderEditImages();
            document.getElementById('edit-panel').style.display = 'block';
            showToast("Product Loaded for Editing");
        }
    } catch(e) { showToast("Error loading product", true); }
});

document.getElementById('edit-soldout-toggle').addEventListener('change', (e) => {
    const isSoldOut = e.target.checked;
    document.querySelectorAll('.edit-size-cb').forEach(cb => {
        if(isSoldOut) cb.checked = false;
        cb.disabled = isSoldOut;
        cb.parentElement.classList.toggle('disabled', isSoldOut);
    });
});

function renderEditImages() {
    const gallery = document.getElementById('edit-image-gallery');
    gallery.innerHTML = (window._currentEditImages || []).map((img, idx) => `
        <div class="image-card">
            <img src="${img}">
            <button class="delete-img" onclick="removeEditImage(${idx})"><i class="fas fa-trash"></i></button>
        </div>
    `).join('');
}

window.removeEditImage = function(idx) {
    window._currentEditImages.splice(idx, 1);
    renderEditImages();
};

document.getElementById('save-product-btn').addEventListener('click', async () => {
    const btn = document.getElementById('save-product-btn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
    btn.disabled = true;
    try {
        const fileInput = document.getElementById('edit-new-images');
        const newBase64Images = [];
        for (let i = 0; i < fileInput.files.length; i++) {
            const base64 = await resizeImage(fileInput.files[i]); 
            if(base64) newBase64Images.push(base64);
        }
        const finalImages = [...(window._currentEditImages || []), ...newBase64Images];
        const isSoldOut = document.getElementById('edit-soldout-toggle').checked;
        const selectedSizes = isSoldOut ? [] : Array.from(document.querySelectorAll('.edit-size-cb:checked')).map(cb => cb.value);
        const updateData = {
            productId: document.getElementById('edit-product-id').value,
            name: document.getElementById('edit-product-name').value,
            price: parseFloat(document.getElementById('edit-product-price').value),
            category: document.getElementById('edit-product-category').value,
            stockStatus: isSoldOut ? 'out-of-stock' : 'in-stock',
            availableSizes: selectedSizes,
            images: finalImages
        };
        const res = await fetch('/api/products/add', { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updateData) 
        });
        const result = await res.json();
        if(result.success) {
            showToast("Product Updated Successfully!");
            document.getElementById('edit-new-images').value = '';
            window._currentEditImages = finalImages;
            renderEditImages();
            fetchInventory();
        } else { showToast(result.message || "Update failed", true); }
    } catch (err) { showToast("Save failed: " + err.message, true); }
    finally { btn.innerHTML = originalText; btn.disabled = false; }
});

document.getElementById('delete-product-editor-btn').addEventListener('click', async () => {
    const id = document.getElementById('edit-product-id').value;
    if(!id) return;
    await deleteProduct(id);
    document.getElementById('edit-panel').style.display = 'none';
    loadProductListForDropdown();
});
</script>
