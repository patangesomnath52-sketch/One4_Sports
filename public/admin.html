<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
</head>
<body>

<div id="login-screen" style="display:flex; justify-content:center; align-items:center; height:100vh;">
    <button id="auth-btn" style="padding:20px; cursor:pointer;">Login as Admin</button>
</div>

<div id="app-content" style="display:none;">
    <div id="orders-panel" class="panel">
        <table id="order-table">
            <thead><tr><th>ID</th><th>Customer</th><th>Status</th></tr></thead>
            <tbody id="order-body"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // --- PASTE YOUR CONFIG HERE ---
    const firebaseConfig = {
  apiKey: "AIzaSyBxyUiyy0L_hDuWul8SrntOtYgI48IiUPQ",
  authDomain: "rj-sports-24dae.firebaseapp.com",
  projectId: "rj-sports-24dae",
  storageBucket: "rj-sports-24dae.firebasestorage.app",
  messagingSenderId: "952774877656",
  appId: "1:952774877656:web:aee2f70e14daeb07e912ad"
};

    const auth = getAuth(initializeApp(firebaseConfig));
    const provider = new GoogleAuthProvider();
    const adminEmails = ["Viratjadhav03@gmail.com", "patangesomnath52@gmail.com"];

    // --- FIX: Event Listener inside the module ---
    document.getElementById('auth-btn').addEventListener('click', async () => {
        try {
            const res = await signInWithPopup(auth, provider);
            if(adminEmails.includes(res.user.email)) {
                sessionStorage.setItem('admin_logged_in', 'true');
                window.location.reload();
            } else { 
                alert("Unauthorized"); 
                auth.signOut(); 
            }
        } catch(e) { 
            alert("Auth Error: " + e.message); 
        }
    });

    // --- ORDER FETCHING ---
    window.fetchOrders = async () => {
        const body = document.getElementById('order-body');
        try {
            const res = await fetch('/api/orders');
            const data = await res.json();
            body.innerHTML = data.orders.map(o => `
                <tr>
                    <td>${o.orderId}</td>
                    <td>${o.customer}</td>
                    <td>${o.status}</td>
                </tr>
            `).join('');
        } catch(err) {
            console.error("Fetch failed (Check your backend routes):", err);
        }
    }

    // --- INITIALIZATION ---
    if(sessionStorage.getItem('admin_logged_in')) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        fetchOrders();
    }
</script>
</body>
</html>
