<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One4Sports | Secure Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --dark: #0f172a; --accent: #E10600; --bg: #f4f6f8; --card-bg: #ffffff; --border: #e2e8f0; --text-muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background: var(--bg); color: #1e293b; height: 100vh; overflow: hidden; }
        
        /* Layout */
        #login-screen { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .login-box { background: white; padding: 40px 30px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 25px 40px rgba(0,0,0,0.3); }
        .login-logo { font-size: 36px; font-weight: 900; margin-bottom: 16px; color: var(--dark); }
        .login-logo span { color: var(--accent); }
        .login-input { width: 100%; padding: 16px; border: 2px solid var(--border); border-radius: 14px; font-size: 18px; font-weight: 600; margin-bottom: 20px; text-align: center; }
        .login-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 18px; font-weight: 800; cursor: pointer; }
        
        #app-content { display: none; flex-direction: column; height: 100vh; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Components */
        .sidebar { width: 280px; background: white; border-right: 1px solid var(--border); padding-top: 24px; transition: transform 0.25s; }
        .nav-item { padding: 16px 28px; cursor: pointer; font-weight: 700; color: #475569; display: flex; align-items: center; gap: 14px; border-left: 4px solid transparent; transition: all 0.2s; }
        .nav-item.active { background: #fff0ee; color: var(--accent); border-left-color: var(--accent); }
        
        .content { flex: 1; padding: 28px; overflow-y: auto; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .card { background: white; border-radius: 24px; padding: 24px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        /* Inputs & Tables */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-control { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 16px; }
        .btn-action { background: var(--dark); color: white; border: none; padding: 16px; border-radius: 40px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 16px; }
        
        .sizes-manager { background: #f8fafc; border-radius: 20px; padding: 16px; margin-top: 12px; }
        .size-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; }
        
        #toast { visibility: hidden; background: #1e293b; color: white; padding: 14px 24px; border-radius: 60px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10001; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="login-logo">One4<span>Sports</span></div>
        <input type="password" id="admin-pin" class="login-input" placeholder="Enter Secure PIN">
        <button class="login-btn" onclick="Auth.login()">Access Dashboard</button>
    </div>
</div>

<div id="app-content">
    <header class="top-navbar" style="background: var(--dark); color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center;">
        <div class="brand-text" style="font-weight: 800; font-size: 18px;">ONE4SPORTS ADMIN</div>
        <div class="logout-btn" onclick="Auth.logout()" style="cursor: pointer;">Logout</div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="nav-item active" onclick="App.switchTab('dashboard', this)"><i class="fas fa-chart-line"></i> Orders</div>
            <div class="nav-item" onclick="App.switchTab('inventory', this)"><i class="fas fa-box-open"></i> Inventory</div>
            <div class="nav-item" onclick="App.switchTab('upload', this)"><i class="fas fa-cloud-upload-alt"></i> Add Product</div>
        </aside>

        <main class="content">
            <section id="sec-dashboard" class="admin-section active">
                <h2>📦 Orders Overview</h2>
                <div class="card">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead><tr><th>Order ID</th><th>Customer</th><th>Status</th></tr></thead>
                        <tbody id="order-table-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="sec-inventory" class="admin-section">
                <h2>🏏 Product Inventory</h2>
                <div id="inventory-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px;"></div>
            </section>

            <section id="sec-upload" class="admin-section">
                <h2>➕ Add New Product</h2>
                <div class="card">
                    <form id="uploadForm">
                        <div class="form-grid">
                            <input type="text" id="p-id" class="form-control" placeholder="Product ID" required>
                            <select id="p-category" class="form-control" onchange="App.handleCategoryChange(this.value)">
                                <option value="Cricket">Cricket</option>
                                <option value="Footwear">Footwear</option>
                            </select>
                            <input type="text" id="p-name" class="form-control" placeholder="Product Name" style="grid-column: span 2;" required>
                            <input type="number" id="p-price" class="form-control" placeholder="Price (₹)" required>
                            <input type="file" id="p-images" class="form-control" accept="image/*" multiple>
                        </div>
                        <div id="size-rows-container" class="sizes-manager"></div>
                        <button type="button" class="btn-action" onclick="App.addSizeRow()" style="background: var(--accent);">+ Add Size</button>
                        <button type="submit" class="btn-action">Publish to Store</button>
                    </form>
                </div>
            </section>
        </main>
    </div>
</div>
<div id="toast"></div>

<script>
    // --- MOCK API LAYER ---
    const DB = {
        get: (key) => JSON.parse(localStorage.getItem(key) || '[]'),
        set: (key, val) => localStorage.setItem(key, JSON.stringify(val))
    };

    // --- APP CONTROLLER ---
    const App = {
        currentSizeRows: [],
        
        init: () => {
            if(sessionStorage.getItem('auth') === 'true') App.showDashboard();
        },

        showDashboard: () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            App.renderOrders();
            App.renderInventory();
        },

        switchTab: (id, el) => {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`sec-${id}`).classList.add('active');
            el.classList.add('active');
        },

        renderOrders: () => {
            const orders = DB.get('one4sports_orders');
            document.getElementById('order-table-body').innerHTML = orders.map(o => `
                <tr><td>#${o.orderId}</td><td>${o.customer}</td><td>${o.status}</td></tr>
            `).join('');
        },

        renderInventory: () => {
            const products = DB.get('one4sports_products');
            const container = document.getElementById('inventory-list');
            container.innerHTML = products.map(p => `
                <div class="card" style="margin:0">
                    <strong>${p.name}</strong><br>₹${p.price}
                    <button class="btn-action" style="margin-top:10px" onclick="App.deleteProduct('${p.productId}')">Delete</button>
                </div>
            `).join('');
        },

        addSizeRow: () => {
            App.currentSizeRows.push({ size: "", status: "Available" });
            App.renderSizeRows();
        },

        renderSizeRows: () => {
            const container = document.getElementById('size-rows-container');
            container.innerHTML = App.currentSizeRows.map((r, i) => `
                <div class="size-row">
                    <input type="text" value="${r.size}" onchange="App.currentSizeRows[${i}].size=this.value" placeholder="Size">
                    <button type="button" onclick="App.currentSizeRows.splice(${i},1); App.renderSizeRows()">✕</button>
                </div>
            `).join('');
        },

        handleCategoryChange: (cat) => {
            App.currentSizeRows = (cat === 'Footwear') ? [{size:'7', status:'Available'}, {size:'8', status:'Available'}] : [];
            App.renderSizeRows();
        },

        deleteProduct: (id) => {
            let products = DB.get('one4sports_products').filter(p => p.productId !== id);
            DB.set('one4sports_products', products);
            App.renderInventory();
        }
    };

    // --- AUTH ---
    const Auth = {
        login: () => {
            if(document.getElementById('admin-pin').value === "ONE42024") {
                sessionStorage.setItem('auth', 'true');
                App.showDashboard();
            } else alert("Invalid PIN");
        },
        logout: () => { sessionStorage.clear(); location.reload(); }
    };

    // --- FORM HANDLING ---
    document.getElementById('uploadForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const newProduct = {
            productId: document.getElementById('p-id').value,
            name: document.getElementById('p-name').value,
            price: document.getElementById('p-price').value,
            category: document.getElementById('p-category').value,
            sizes: App.currentSizeRows
        };
        const products = DB.get('one4sports_products');
        products.push(newProduct);
        DB.set('one4sports_products', products);
        
        document.getElementById('uploadForm').reset();
        App.renderInventory();
        alert("Product Published!");
    });

    App.init();
</script>
</body>
</html>
