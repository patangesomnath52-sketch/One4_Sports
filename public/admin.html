<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RJ Sports Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --amz-dark: #232f3e; --amz-orange: #f90; --amz-btn: #FFD814; --amz-border: #d5d9d9; }
        body { font-family: sans-serif; background: #f2f4f8; display: flex; flex-direction: column; }
        .top-navbar { background: var(--amz-dark); color: white; padding: 15px; display: flex; justify-content: space-between; }
        .main-container { display: flex; flex: 1; }
        .sidebar { width: 250px; background: white; border-right: 1px solid var(--amz-border); min-height: 100vh; }
        .nav-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #eee; }
        .nav-item.active { background: #f7fafa; color: #007185; border-left: 4px solid #007185; }
        .content { flex: 1; padding: 20px; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .kpi-card { background: white; padding: 20px; border-radius: 8px; border: 1px solid var(--amz-border); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .form-control { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-action { background: var(--amz-btn); border: 1px solid #FCD200; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <header class="top-navbar">
        <div class="logo">RJ SPORTS Admin</div>
        <div>Welcome, Admin</div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="nav-item active" onclick="switchTab('dashboard', this)">Dashboard</div>
            <div class="nav-item" onclick="switchTab('upload', this)">Add Product</div>
        </aside>

        <main class="content">
            <div id="sec-dashboard" class="admin-section active">
                <h2>Dashboard</h2>
                <div class="kpi-card">Total Orders: <span id="kpi-orders">0</span></div>
                <table>
                    <thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="order-table-body"></tbody>
                </table>
            </div>

            <div id="sec-upload" class="admin-section">
                <h2>Add Product</h2>
                <form id="uploadForm" class="kpi-card">
                    <input type="text" id="p-id" class="form-control" placeholder="Product ID" required>
                    <input type="text" id="p-name" class="form-control" placeholder="Product Name" required>
                    <input type="number" id="p-price" class="form-control" placeholder="Price" required>
                    <select id="p-category" class="form-control">
                        <option>Shoes</option><option>Cricket</option>
                    </select>
                    <input type="file" id="p-images" class="form-control" multiple required>
                    <button type="submit" id="uploadBtn" class="btn-action">Upload to Cloudinary</button>
                </form>
            </div>
        </main>
    </div>

    <script>
        function switchTab(id, el) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('sec-'+id).classList.add('active');
            el.classList.add('active');
        }

        async function fetchDashboardData() {
            const res = await fetch('/api/orders');
            const data = await res.json();
            if(data.success) {
                document.getElementById('kpi-orders').innerText = data.orders.length;
                document.getElementById('order-table-body').innerHTML = data.orders.map(o => `
                    <tr>
                        <td>#${o.orderId}</td>
                        <td>${o.customer}</td>
                        <td>₹${o.total}</td>
                        <td>${o.status}</td>
                        <td><button class="btn-action">Update</button></td>
                    </tr>
                `).join('');
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('uploadBtn');
            btn.innerText = "Uploading...";
            const formData = new FormData();
            formData.append('productId', document.getElementById('p-id').value);
            formData.append('name', document.getElementById('p-name').value);
            formData.append('price', document.getElementById('p-price').value);
            formData.append('category', document.getElementById('p-category').value);
            const files = document.getElementById('p-images').files;
            for(let i=0; i<files.length; i++) formData.append('productImages', files[i]);

            const res = await fetch('/api/products/add', { method: 'POST', body: formData });
            const result = await res.json();
            alert(result.message);
            btn.innerText = "Upload to Cloudinary";
            if(result.success) e.target.reset();
        });

        document.addEventListener('DOMContentLoaded', fetchDashboardData);
    </script>
</body>
</html>
