<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>one4sports | Secure Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* (Your existing admin CSS goes here - I am including the core structure to keep it clean) */
        :root { --dark: #1e293b; --accent: #E10600; --bg: #f8fafc; --card-bg: #ffffff; --border: #e2e8f0; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; }
        body { background: var(--bg); color: #334155; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* LOGIN SCREEN STYLES */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-logo { font-size: 28px; font-weight: 900; margin-bottom: 20px; color: var(--dark); }
        .login-logo span { color: var(--accent); }
        .login-input { width: 100%; padding: 15px; border: 2px solid var(--border); border-radius: 8px; font-size: 16px; margin-bottom: 20px; text-align: center; font-weight: bold; letter-spacing: 2px; }
        .login-input:focus { border-color: var(--accent); outline: none; }
        .login-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .login-btn:hover { background: #c10500; }
        .error-msg { color: var(--accent); font-weight: 700; font-size: 14px; margin-bottom: 15px; display: none; }

        /* Navbar & Main App (Hidden by default until login) */
        #app-content { display: none; flex-direction: column; height: 100vh; }
        .top-navbar { background: var(--dark); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); z-index: 10; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: 1px; }
        .logo span { color: var(--accent); }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar & Content */
        .sidebar { width: 260px; background: var(--card-bg); border-right: 1px solid var(--border); padding-top: 20px; }
        .nav-item { padding: 18px 25px; cursor: pointer; border-left: 4px solid transparent; font-weight: 700; font-size: 16px; color: #64748b; transition: all 0.3s; display: flex; align-items: center; gap: 15px; }
        .nav-item:hover { background: #f1f5f9; color: var(--dark); }
        .nav-item.active { background: #fee2e2; color: var(--accent); border-left-color: var(--accent); }
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .admin-section { display: none; animation: fadeIn 0.4s ease; }
        .admin-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Forms & Grids */
        .section-header h2 { font-size: 28px; color: var(--dark); margin-bottom: 5px; font-weight: 800; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group.full-width { grid-column: span 2; }
        label { display: block; font-weight: 700; margin-bottom: 8px; }
        .form-control { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 8px; font-weight: 600; }
        .btn-action { background: var(--dark); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 800; width: 100%; cursor: pointer; }
        .btn-action:hover { background: var(--accent); }
        
        /* Tables & Inventory Grid */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8fafc; padding: 15px; text-align: left; font-weight: 800; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-weight: 600; }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; margin-top: 20px; }
        .product-card { background: white; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .product-img { width: 100%; height: 200px; object-fit: cover; }
        .btn-delete { background: #fee2e2; color: var(--accent); border: none; padding: 10px; border-radius: 6px; width: 100%; font-weight: 700; cursor: pointer; }
        #toast { visibility: hidden; min-width: 300px; background: var(--dark); color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: 700; opacity: 0; transition: 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <div class="login-logo">RJ <span>SPORTS</span></div>
            <h3 style="margin-bottom: 20px; color: #64748b;">Admin Portal</h3>
            <div class="error-msg" id="login-error">Incorrect PIN. Please try again.</div>
            <input type="password" id="admin-pin" class="login-input" placeholder="Enter Secure PIN">
            <button class="login-btn" onclick="checkLogin()">Access Dashboard</button>
        </div>
    </div>

    <div id="app-content">
        <header class="top-navbar">
         <a href="index.html" class="rj-logo">one4<span>spoorts</span></a>
            <div style="font-weight: 600; cursor: pointer;" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </div>
        </header>

        <div class="main-container">
            <aside class="sidebar">
                <div class="nav-item active" onclick="switchTab('dashboard', this)"><i class="fas fa-chart-line"></i> Orders Dashboard</div>
                <div class="nav-item" onclick="switchTab('inventory', this)"><i class="fas fa-box-open"></i> Manage Inventory</div>
                <div class="nav-item" onclick="switchTab('upload', this)"><i class="fas fa-cloud-upload-alt"></i> Add Product</div>
            </aside>

            <main class="content">
                <div id="sec-dashboard" class="admin-section active">
                    <div class="section-header"><h2>Orders Overview</h2></div>
                    <div class="card">
                        <h3>Recent Orders (<span id="kpi-orders">0</span> Total)</h3>
                        <table>
                            <thead><tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Status</th></tr></thead>
                            <tbody id="order-table-body"></tbody>
                        </table>
                    </div>
                </div>

                <div id="sec-inventory" class="admin-section">
                    <div class="section-header"><h2>Manage Inventory</h2></div>
                    <div class="inventory-grid" id="inventory-list"></div>
                </div>

                <div id="sec-upload" class="admin-section">
                    <div class="section-header"><h2>Add New Product</h2></div>
                    <div class="card">
                        <form id="uploadForm">
                            <div class="form-grid">
                                <div class="form-group"><label>Product ID</label><input type="text" id="p-id" class="form-control" required></div>
                                <div class="form-group">
                                    <label>Category</label>
                                    <select id="p-category" class="form-control">
                                        <option value="Cricket">Cricket Equipment</option>
                                        <option value="Footwear">Sports Footwear</option>
                                        <option value="Accessories">Accessories</option>
                                    </select>
                                </div>
                                <div class="form-group full-width"><label>Product Title</label><input type="text" id="p-name" class="form-control" required></div>
                                <div class="form-group"><label>Selling Price (₹)</label><input type="number" id="p-price" class="form-control" required></div>
                                <div class="form-group"><label>Product Images (Max 3)</label><input type="file" id="p-images" class="form-control" multiple accept="image/*" required></div>
                            </div>
                            <button type="submit" id="uploadBtn" class="btn-action"><i class="fas fa-upload"></i> Publish to Store</button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="toast">Notification Message</div>

    <script>
        // --- SECURITY LOGIC ---
        const ADMIN_PIN = "RJ2024"; // Change this to whatever you want!

        // Check if already logged in this session
        if(sessionStorage.getItem('rj_admin_auth') === 'true') {
            unlockDashboard();
        }

        function checkLogin() {
            const input = document.getElementById('admin-pin').value;
            if(input === ADMIN_PIN) {
                sessionStorage.setItem('rj_admin_auth', 'true');
                unlockDashboard();
            } else {
                document.getElementById('login-error').style.display = 'block';
                document.getElementById('admin-pin').value = '';
            }
        }

        // Allow pressing "Enter" to login
        document.getElementById('admin-pin').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkLogin();
        });

        function unlockDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            fetchDashboardData();
        }

        function logout() {
            sessionStorage.removeItem('rj_admin_auth');
            location.reload(); // Refresh the page to show login screen
        }

        // --- DASHBOARD LOGIC (Your existing code) ---
        function switchTab(id, el) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('sec-'+id).classList.add('active');
            el.classList.add('active');
            if(id === 'dashboard') fetchDashboardData();
            if(id === 'inventory') fetchInventory();
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        async function fetchDashboardData() {
            try {
                const res = await fetch('/api/orders');
                const data = await res.json();
                if(data.success) {
                    document.getElementById('kpi-orders').innerText = data.orders.length;
                    document.getElementById('order-table-body').innerHTML = data.orders.map(o => `<tr><td>#${o.orderId}</td><td>${o.customer}</td><td>₹${o.total}</td><td>${o.status}</td></tr>`).join('');
                }
            } catch (err) { console.log("Fetch error"); }
        }

        async function fetchInventory() {
            const inventoryBox = document.getElementById('inventory-list');
            inventoryBox.innerHTML = '<p>Loading products...</p>';
            try {
                const res = await fetch('/api/products');
                const data = await res.json();
                if(data.success && data.products.length > 0) {
                    inventoryBox.innerHTML = data.products.map(p => {
                        const imgUrl = p.images && p.images.length > 0 ? p.images[0] : 'https://via.placeholder.com/250x200';
                        return `
                            <div class="product-card">
                                <img src="${imgUrl}" class="product-img">
                                <div style="padding: 15px;">
                                    <div style="font-weight: 800;">${p.name}</div>
                                    <div style="color: var(--success); font-weight: 800; margin-bottom: 10px;">₹${p.price}</div>
                                    <button class="btn-delete" onclick="deleteProduct('${p.productId}')"><i class="fas fa-trash"></i> Remove</button>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    inventoryBox.innerHTML = '<p>Your store is currently empty.</p>';
                }
            } catch (err) { inventoryBox.innerHTML = '<p>Failed to load inventory.</p>'; }
        }

        async function deleteProduct(productId) {
            if(!confirm("Delete this product?")) return;
            try {
                const res = await fetch(`/api/products/${productId}`, { method: 'DELETE' });
                const data = await res.json();
                if(data.success) { showToast("Product removed!"); fetchInventory(); }
            } catch (err) { showToast("Error removing product."); }
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('uploadBtn');
            btn.innerHTML = 'Uploading...'; btn.disabled = true;

            const formData = new FormData();
            formData.append('productId', document.getElementById('p-id').value);
            formData.append('name', document.getElementById('p-name').value);
            formData.append('price', document.getElementById('p-price').value);
            formData.append('category', document.getElementById('p-category').value);
            const files = document.getElementById('p-images').files;
            for(let i=0; i<files.length; i++) formData.append('productImages', files[i]);

            try {
                const res = await fetch('/api/products/add', { method: 'POST', body: formData });
                const result = await res.json();
                if(result.success) { showToast("Product Published!"); e.target.reset(); }
            } catch (err) { showToast("Upload failed."); } 
            finally { btn.innerHTML = '<i class="fas fa-upload"></i> Publish to Store'; btn.disabled = false; }
        });
    </script>
</body>
</html>
