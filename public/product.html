<!-- HEADER, BACK BAR, LOADER, PRODUCT CONTAINER, REVIEW SECTION, FOOTER, TOAST -->
<!-- Keep all HTML exactly as you had, no changes needed -->

<script>
    // ========== NEW: API BASE URL (change if needed) ==========
    const API_BASE = ''; // relative to current domain, e.g. '/api'
    const REVIEWS_API = `${API_BASE}/reviews`;

    let currentProduct = null;
    let selectedSize = 'Standard';
    let currentRating = 5;
    let uploadedImageBase64 = null;
    let reviewImageFile = null;

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    // ---------- REVIEWS API FUNCTIONS (replace localStorage) ----------
    async function loadReviewsFromAPI(productId) {
        try {
            const res = await fetch(`${REVIEWS_API}?productId=${encodeURIComponent(productId)}`);
            const data = await res.json();
            if (data.success) {
                return data.reviews || [];
            } else {
                console.warn('Failed to load reviews:', data.message);
                return [];
            }
        } catch (err) {
            console.error('Error loading reviews:', err);
            return [];
        }
    }

    async function saveReviewToAPI(reviewData) {
        try {
            const res = await fetch(REVIEWS_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(reviewData)
            });
            const data = await res.json();
            if (data.success) {
                return data.review;
            } else {
                throw new Error(data.message || 'Server error');
            }
        } catch (err) {
            console.error('Error posting review:', err);
            throw err;
        }
    }

    async function deleteReviewFromAPI(reviewId) {
        try {
            const res = await fetch(`${REVIEWS_API}/${reviewId}`, {
                method: 'DELETE'
            });
            const data = await res.json();
            if (!data.success) {
                throw new Error(data.message || 'Deletion failed');
            }
            return true;
        } catch (err) {
            console.error('Error deleting review:', err);
            throw err;
        }
    }

    // ---------- RENDER REVIEWS UI (with API) ----------
    async function renderReviewsUI() {
        const container = document.getElementById('reviewsContainer');
        if (!container || !currentProduct) return;

        try {
            const reviews = await loadReviewsFromAPI(currentProduct.productId);
            const totalRatings = reviews.length;
            const avgRating = totalRatings ? (reviews.reduce((sum, r) => sum + r.rating, 0) / totalRatings).toFixed(1) : 0;
            const loggedUser = localStorage.getItem('rj_loggedInUser');

            let reviewsHtml = `
                <div class="reviews-header">
                    <div class="rating-summary"><h3>⚡ CUSTOMER REVIEWS</h3><div class="stars-large"><span class="avg-rating">${avgRating}</span>${renderStarsStatic(avgRating)}<span style="font-size:14px; margin-left:8px;">(${totalRatings} reviews)</span></div></div>
                    <div><i class="fas fa-camera-retro"></i> Share your gear photos</div>
                </div>
                <div class="reviews-list" id="reviewsList">
            `;
            if (reviews.length === 0) {
                reviewsHtml += `<div style="text-align:center; padding:40px; color:var(--text-muted);">✨ No reviews yet. Be the first to share your experience!</div>`;
            } else {
                reviews.forEach(rev => {
                    const isOwner = loggedUser === rev.userName;
                    reviewsHtml += `
                        <div class="review-item">
                            <div class="reviewer-info"><div class="reviewer-name"><i class="fas fa-user-astronaut"></i> ${escapeHtml(rev.userName)}</div><div class="review-stars">${renderStarsStatic(rev.rating)}</div><div class="review-date"><i class="far fa-calendar-alt"></i> ${rev.dateDisplay || 'Recently'}</div>${isOwner ? `<button class="delete-review" onclick="deleteReview(${rev.id})"><i class="fas fa-trash-alt"></i></button>` : ''}</div>
                            <div class="review-comment">${escapeHtml(rev.comment)}</div>
                            ${rev.imageDataUrl ? `<div class="review-image" onclick="window.open('${rev.imageDataUrl}', '_blank')"><img src="${rev.imageDataUrl}" alt="customer photo"></div>` : ''}
                        </div>`;
                });
            }
            reviewsHtml += `</div>`;

            // Review form (only for logged-in users)
            if (loggedUser) {
                reviewsHtml += `
                    <div class="review-form">
                        <h4><i class="fas fa-star" style="color:var(--warning);"></i> Share your experience & upload product photo</h4>
                        <div class="star-picker" id="starPicker">${[1,2,3,4,5].map(s => `<i class="fa-${s <= currentRating ? 'solid' : 'regular'} fa-star" data-rating="${s}"></i>`).join('')}</div>
                        <textarea id="reviewComment" class="review-input" rows="3" placeholder="How's the product quality? Share your feedback..."></textarea>
                        <div><label class="file-label"><i class="fas fa-upload"></i> Upload Received Product Photo <input type="file" id="reviewPhotoInput" accept="image/jpeg,image/png,image/jpg" style="display:none;"></label></div>
                        <div id="imagePreviewDiv" style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px;"></div>
                        <button class="submit-review" id="submitReviewBtn"><i class="fas fa-pen-fancy"></i> POST REVIEW WITH PHOTO</button>
                    </div>`;
            } else {
                reviewsHtml += `<div class="login-prompt"><i class="fas fa-lock"></i> <a href="signin.html?redirect=${encodeURIComponent(window.location.href)}">Sign in to review this product & upload photos</a></div>`;
            }

            container.innerHTML = reviewsHtml;
            attachReviewEventHandlers();
            if (loggedUser) attachStarPickerEvents();
        } catch (err) {
            container.innerHTML = `<div style="padding:20px; color:var(--accent);">⚠️ Could not load reviews. Please refresh.</div>`;
        }
    }

    // ---------- SUBMIT REVIEW (using API) ----------
    async function submitReview() {
        if (!currentProduct) return;
        const loggedUser = localStorage.getItem('rj_loggedInUser');
        if (!loggedUser) { 
            showToastMessage("Sign in to submit a review", false); 
            window.location.href = `signin.html?redirect=${encodeURIComponent(window.location.href)}`; 
            return; 
        }
        const comment = document.getElementById('reviewComment')?.value.trim();
        if (!comment || comment.length < 5) { 
            showToastMessage("Please write a detailed review (min 5 chars)", false); 
            return; 
        }
        const rating = currentRating;
        let imageData = uploadedImageBase64;

        const reviewData = {
            productId: currentProduct.productId,
            userName: loggedUser,
            userEmail: localStorage.getItem('rj_userEmail') || loggedUser,
            rating: rating,
            comment: comment,
            imageDataUrl: imageData || null
        };

        try {
            const savedReview = await saveReviewToAPI(reviewData);
            // Clear form
            document.getElementById('reviewComment').value = '';
            if (document.getElementById('imagePreviewDiv')) document.getElementById('imagePreviewDiv').innerHTML = '';
            uploadedImageBase64 = null;
            reviewImageFile = null;
            currentRating = 5;
            updateStarPickerUI();
            showToastMessage("Review posted! +10 pts loyalty", true);
            // Refresh reviews list
            renderReviewsUI();
        } catch (err) {
            showToastMessage(err.message || "Failed to post review", false);
        }
    }

    // ---------- DELETE REVIEW (using API) ----------
    async function deleteReview(reviewId) {
        const loggedUser = localStorage.getItem('rj_loggedInUser');
        if (!loggedUser) { showToastMessage("Please sign in", false); return; }
        if (!confirm("Are you sure you want to delete your review?")) return;
        try {
            await deleteReviewFromAPI(reviewId);
            showToastMessage("Review removed", true);
            renderReviewsUI();
        } catch (err) {
            showToastMessage(err.message || "Deletion failed", false);
        }
    }

    // ---------- HELPER FUNCTIONS (unchanged) ----------
    function renderStarsStatic(rating) { let html = ''; for(let i=1;i<=5;i++) html += `<i class="fa-${i<=Math.round(rating)?'solid':'regular'} fa-star" style="font-size:14px;"></i>`; return html; }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function showToastMessage(msg, isSuccess) { const toast = document.getElementById("toast"); toast.innerHTML = `<i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-exclamation-triangle'}" style="margin-right:8px;"></i> ${msg}`; toast.className = "show"; setTimeout(() => toast.className = toast.className.replace("show",""), 3000); }
    function updateStarPickerUI() { const stars = document.querySelectorAll('#starPicker i'); stars.forEach((star, idx) => { if (idx < currentRating) star.className = 'fa-solid fa-star'; else star.className = 'fa-regular fa-star'; }); }
    function attachStarPickerEvents() { const stars = document.querySelectorAll('#starPicker i'); stars.forEach(star => { star.onclick = () => { currentRating = parseInt(star.dataset.rating); updateStarPickerUI(); }; }); }
    function attachReviewEventHandlers() {
        const submitBtn = document.getElementById('submitReviewBtn');
        if (submitBtn) submitBtn.onclick = () => submitReview();
        const photoInput = document.getElementById('reviewPhotoInput');
        if (photoInput) {
            photoInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (file && (file.type === 'image/jpeg' || file.type === 'image/png')) {
                    if (file.size > 3 * 1024 * 1024) { showToastMessage("Max 3MB image", false); return; }
                    const compressed = await compressAndStoreImage(file);
                    uploadedImageBase64 = compressed;
                    const previewDiv = document.getElementById('imagePreviewDiv');
                    previewDiv.innerHTML = `<div class="image-preview"><img src="${compressed}" alt="preview"><div class="remove-img" onclick="clearUploadedImage()"><i class="fas fa-times"></i></div></div>`;
                } else alert("Only JPEG/PNG images");
            };
        }
    }
    function clearUploadedImage() { uploadedImageBase64 = null; if(document.getElementById('imagePreviewDiv')) document.getElementById('imagePreviewDiv').innerHTML = ''; document.getElementById('reviewPhotoInput').value = ''; }

    function compressAndStoreImage(file) {
        return new Promise((resolve) => {
            if (!file) return resolve(null);
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const maxSize = 800;
                    if (width > height && width > maxSize) { height = (height * maxSize) / width; width = maxSize; }
                    else if (height > maxSize) { width = (width * maxSize) / height; height = maxSize; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    const compressed = canvas.toDataURL('image/jpeg', 0.7);
                    resolve(compressed);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    // ---------- PRODUCT LOAD (unchanged) ----------
    async function loadProductDetails() {
        if (!productId) { document.getElementById('loader').innerHTML = "<div>Product ID missing</div>"; return; }
        try {
            const res = await fetch(`/api/products/${productId}`);
            if (!res.ok) throw new Error(`Server returned ${res.status}`);
            const data = await res.json();
            if (data.success) { 
                currentProduct = data.product; 
                renderProduct(currentProduct); 
                document.getElementById('reviewsSection').style.display = 'block'; 
                renderReviewsUI(); 
            } else {
                throw new Error(data.message || "Unknown error");
            }
        } catch (err) { 
            console.error("Fetch Error:", err);
            document.getElementById('loader').innerHTML = `<i class='fas fa-exclamation-triangle'></i><div>Connection Failed: ${err.message}</div>`;
        }
    }

    function renderProduct(p) {
        // (your existing renderProduct function – keep unchanged)
        // ...
    }

    // ---------- CART + AUTH (unchanged) ----------
    // (your existing cart and auth code)
    // ...

    // ---------- INIT ----------
    window.addEventListener('DOMContentLoaded', () => { 
        checkLoginStatus(); 
        updateCartCount(); 
        loadProductDetails(); 
    });

    // Expose functions to global scope for inline onclick
    window.selectSize = selectSize; 
    window.swapImage = swapImage; 
    window.deleteReview = deleteReview; 
    window.clearUploadedImage = clearUploadedImage;
</script>
</body>
</html>
