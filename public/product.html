<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details | One4Sports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== YOUR STYLES (same as before – keep them) ===== */
        :root { /* ... */ }
        /* (all your CSS) */
    </style>
</head>
<body>

<!-- HEADER, BACK BAR, LOADER, PRODUCT CONTAINER, REVIEWS, FOOTER, TOAST -->
<!-- (exactly as before – no changes needed) -->

<script>
    // ============================================================
    //  GLOBALS
    // ============================================================
    const API_BASE = ''; // if your API is at a different base, set it, e.g. '/api'
    const REVIEWS_API = `${API_BASE}/reviews`;

    let currentProduct = null;
    let selectedSize = 'Standard';
    let currentRating = 5;
    let uploadedImageBase64 = null;

    const urlParams = new URLSearchParams(window.location.search);
    let productId = urlParams.get('id') || urlParams.get('productId');

    // ============================================================
    //  UTILITY FUNCTIONS
    // ============================================================
    function showToastMessage(msg, isSuccess) {
        const toast = document.getElementById('toast');
        if (!toast) return;
        toast.innerHTML = `<i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-exclamation-triangle'}" style="margin-right:8px;"></i> ${msg}`;
        toast.className = 'show';
        setTimeout(() => toast.className = toast.className.replace('show',''), 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    function renderStarsStatic(rating) {
        let html = '';
        for (let i=1; i<=5; i++) {
            html += `<i class="fa-${i <= Math.round(rating) ? 'solid' : 'regular'} fa-star" style="font-size:14px;"></i>`;
        }
        return html;
    }

    function updateCartCount() {
        const badge = document.getElementById('cart-count');
        if (!badge) return;
        const cart = JSON.parse(localStorage.getItem('rj_cart')) || [];
        badge.innerText = cart.length;
    }

    function checkLoginStatus() {
        const userName = localStorage.getItem('rj_loggedInUser');
        const authText = document.getElementById('auth-text');
        const authBtn = document.getElementById('auth-btn');
        if (userName && authText) {
            authText.innerText = userName.split(' ')[0];
            if (authBtn) {
                authBtn.onclick = (e) => {
                    e.preventDefault();
                    if (confirm('Log out?')) {
                        localStorage.removeItem('rj_loggedInUser');
                        localStorage.removeItem('rj_userEmail');
                        window.location.reload();
                    }
                };
            }
        }
    }

    // ============================================================
    //  SIZE & IMAGE SWAP
    // ============================================================
    function selectSize(el, size) {
        document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('selected'));
        if (el) el.classList.add('selected');
        selectedSize = size;
    }

    function swapImage(src, el) {
        const mainImg = document.getElementById('main-img');
        if (mainImg) mainImg.src = src;
        document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
        if (el) el.classList.add('active');
    }

    // ============================================================
    //  REVIEWS API (backend) – NO localStorage!
    // ============================================================
    async function loadReviewsFromAPI(productId) {
        try {
            const res = await fetch(`${REVIEWS_API}?productId=${encodeURIComponent(productId)}`);
            const data = await res.json();
            console.log('📦 Reviews from server:', data); // debug
            return data.success ? (data.reviews || []) : [];
        } catch (err) {
            console.error('❌ Load reviews error:', err);
            return [];
        }
    }

    async function saveReviewToAPI(reviewData) {
        const res = await fetch(REVIEWS_API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(reviewData)
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Server error');
        return data.review;
    }

    async function deleteReviewFromAPI(reviewId) {
        const res = await fetch(`${REVIEWS_API}/${reviewId}`, { method: 'DELETE' });
        const data = await res.json();
        if (!data.success) throw new Error(data.message || 'Deletion failed');
        return true;
    }

    // ============================================================
    //  RENDER REVIEWS UI – shows ALL reviews for the product
    // ============================================================
    async function renderReviewsUI() {
        const container = document.getElementById('reviewsContainer');
        if (!container || !currentProduct) return;

        try {
            const reviews = await loadReviewsFromAPI(currentProduct.productId);
            const total = reviews.length;
            const avg = total ? (reviews.reduce((s, r) => s + r.rating, 0) / total).toFixed(1) : 0;
            const loggedUser = localStorage.getItem('rj_loggedInUser');

            let html = `
                <div class="reviews-header">
                    <div class="rating-summary">
                        <h3>⚡ CUSTOMER REVIEWS</h3>
                        <div class="stars-large">
                            <span class="avg-rating">${avg}</span>${renderStarsStatic(avg)}
                            <span style="font-size:14px; margin-left:8px;">(${total} reviews)</span>
                        </div>
                    </div>
                    <div><i class="fas fa-camera-retro"></i> Share your gear photos</div>
                </div>
                <div class="reviews-list" id="reviewsList">
            `;
            if (total === 0) {
                html += `<div style="text-align:center; padding:40px; color:var(--text-muted);">✨ No reviews yet. Be the first!</div>`;
            } else {
                // ---- SHOW ALL REVIEWS – no filtering by user ----
                reviews.forEach(rev => {
                    const isOwner = loggedUser === rev.userName;
                    html += `
                        <div class="review-item">
                            <div class="reviewer-info">
                                <div class="reviewer-name"><i class="fas fa-user-astronaut"></i> ${escapeHtml(rev.userName)}</div>
                                <div class="review-stars">${renderStarsStatic(rev.rating)}</div>
                                <div class="review-date"><i class="far fa-calendar-alt"></i> ${rev.dateDisplay || 'Recently'}</div>
                                ${isOwner ? `<button class="delete-review" onclick="deleteReview(${rev.id})"><i class="fas fa-trash-alt"></i></button>` : ''}
                            </div>
                            <div class="review-comment">${escapeHtml(rev.comment)}</div>
                            ${rev.imageDataUrl ? `<div class="review-image" onclick="window.open('${rev.imageDataUrl}', '_blank')"><img src="${rev.imageDataUrl}" alt="customer photo"></div>` : ''}
                        </div>
                    `;
                });
            }
            html += `</div>`;

            // Review form (only for logged-in users)
            if (loggedUser) {
                html += `
                    <div class="review-form">
                        <h4><i class="fas fa-star" style="color:var(--warning);"></i> Share your experience & upload product photo</h4>
                        <div class="star-picker" id="starPicker">
                            ${[1,2,3,4,5].map(s => `<i class="fa-${s <= currentRating ? 'solid' : 'regular'} fa-star" data-rating="${s}"></i>`).join('')}
                        </div>
                        <textarea id="reviewComment" class="review-input" rows="3" placeholder="How's the product quality? Share your feedback..."></textarea>
                        <div>
                            <label class="file-label"><i class="fas fa-upload"></i> Upload Received Product Photo
                                <input type="file" id="reviewPhotoInput" accept="image/jpeg,image/png,image/jpg" style="display:none;">
                            </label>
                        </div>
                        <div id="imagePreviewDiv" style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px;"></div>
                        <button class="submit-review" id="submitReviewBtn"><i class="fas fa-pen-fancy"></i> POST REVIEW WITH PHOTO</button>
                    </div>
                `;
            } else {
                html += `<div class="login-prompt"><i class="fas fa-lock"></i> <a href="signin.html?redirect=${encodeURIComponent(window.location.href)}">Sign in to review this product & upload photos</a></div>`;
            }

            container.innerHTML = html;
            attachReviewEvents();
            if (loggedUser) attachStarPickerEvents();
        } catch (err) {
            console.error('❌ Render reviews error:', err);
            container.innerHTML = `<div style="padding:20px; color:var(--accent);">⚠️ Could not load reviews. Please refresh.</div>`;
        }
    }

    // ============================================================
    //  SUBMIT & DELETE REVIEWS (using API)
    // ============================================================
    async function submitReview() {
        if (!currentProduct) return;
        const loggedUser = localStorage.getItem('rj_loggedInUser');
        if (!loggedUser) {
            showToastMessage('Sign in to submit a review', false);
            window.location.href = `signin.html?redirect=${encodeURIComponent(window.location.href)}`;
            return;
        }
        const comment = document.getElementById('reviewComment')?.value.trim();
        if (!comment || comment.length < 5) {
            showToastMessage('Please write a detailed review (min 5 chars)', false);
            return;
        }
        const rating = currentRating;
        const imageData = uploadedImageBase64;

        const reviewData = {
            productId: currentProduct.productId,
            userName: loggedUser,
            userEmail: localStorage.getItem('rj_userEmail') || loggedUser,
            rating: rating,
            comment: comment,
            imageDataUrl: imageData || null
        };

        try {
            await saveReviewToAPI(reviewData);
            document.getElementById('reviewComment').value = '';
            if (document.getElementById('imagePreviewDiv')) document.getElementById('imagePreviewDiv').innerHTML = '';
            uploadedImageBase64 = null;
            currentRating = 5;
            updateStarPickerUI();
            showToastMessage('Review posted! +10 pts loyalty', true);
            renderReviewsUI(); // refresh the list
        } catch (err) {
            showToastMessage(err.message || 'Failed to post review', false);
        }
    }

    async function deleteReview(reviewId) {
        const loggedUser = localStorage.getItem('rj_loggedInUser');
        if (!loggedUser) { showToastMessage('Please sign in', false); return; }
        if (!confirm('Are you sure you want to delete your review?')) return;
        try {
            await deleteReviewFromAPI(reviewId);
            showToastMessage('Review removed', true);
            renderReviewsUI();
        } catch (err) {
            showToastMessage(err.message || 'Deletion failed', false);
        }
    }

    // ============================================================
    //  STAR PICKER EVENTS
    // ============================================================
    function attachStarPickerEvents() {
        const stars = document.querySelectorAll('#starPicker i');
        stars.forEach(star => {
            star.onclick = () => {
                currentRating = parseInt(star.dataset.rating);
                updateStarPickerUI();
            };
        });
    }

    function updateStarPickerUI() {
        const stars = document.querySelectorAll('#starPicker i');
        stars.forEach((star, idx) => {
            star.className = idx < currentRating ? 'fa-solid fa-star' : 'fa-regular fa-star';
        });
    }

    function attachReviewEvents() {
        const submitBtn = document.getElementById('submitReviewBtn');
        if (submitBtn) submitBtn.onclick = submitReview;

        const photoInput = document.getElementById('reviewPhotoInput');
        if (photoInput) {
            photoInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (file && (file.type === 'image/jpeg' || file.type === 'image/png')) {
                    if (file.size > 3 * 1024 * 1024) {
                        showToastMessage('Max 3MB image', false);
                        return;
                    }
                    const compressed = await compressAndStoreImage(file);
                    uploadedImageBase64 = compressed;
                    const previewDiv = document.getElementById('imagePreviewDiv');
                    if (previewDiv) {
                        previewDiv.innerHTML = `<div class="image-preview"><img src="${compressed}" alt="preview"><div class="remove-img" onclick="clearUploadedImage()"><i class="fas fa-times"></i></div></div>`;
                    }
                } else {
                    alert('Only JPEG/PNG images');
                }
            };
        }
    }

    function clearUploadedImage() {
        uploadedImageBase64 = null;
        const preview = document.getElementById('imagePreviewDiv');
        if (preview) preview.innerHTML = '';
        const input = document.getElementById('reviewPhotoInput');
        if (input) input.value = '';
    }

    function compressAndStoreImage(file) {
        return new Promise((resolve) => {
            if (!file) return resolve(null);
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    const maxSize = 800;
                    if (width > height && width > maxSize) { height = (height * maxSize) / width; width = maxSize; }
                    else if (height > maxSize) { width = (width * maxSize) / height; height = maxSize; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const compressed = canvas.toDataURL('image/jpeg', 0.7);
                    resolve(compressed);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    // ============================================================
    //  PRODUCT LOAD & RENDER
    // ============================================================
    async function loadProductDetails() {
        if (!productId) {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.innerHTML = `
                    <div class="error-box">
                        <h2><i class="fas fa-exclamation-triangle"></i> Product Not Found</h2>
                        <p>No product ID provided. Please go back to the store and select a product.</p>
                        <a href="index.html" class="btn-home"><i class="fas fa-arrow-left"></i> Back to Store</a>
                    </div>
                `;
            }
            return;
        }

        try {
            const res = await fetch(`/api/products/${productId}`);
            if (!res.ok) throw new Error(`Server returned ${res.status}`);
            const data = await res.json();
            if (data.success) {
                currentProduct = data.product;
                renderProduct(currentProduct);
                document.getElementById('reviewsSection').style.display = 'block';
                renderReviewsUI();
            } else {
                throw new Error(data.message || 'Unknown error');
            }
        } catch (err) {
            console.error('❌ Fetch Error:', err);
            const loader = document.getElementById('loader');
            if (loader) {
                loader.innerHTML = `
                    <div class="error-box">
                        <h2><i class="fas fa-exclamation-circle"></i> Connection Error</h2>
                        <p>We couldn't load this product. Please try again later.</p>
                        <a href="index.html" class="btn-home"><i class="fas fa-arrow-left"></i> Back to Store</a>
                    </div>
                `;
            }
        }
    }

    function renderProduct(p) {
        // (same as before – keep your existing render function)
        const price = p.price, mrp = Math.round(price * 1.4);
        document.getElementById('p-category').innerText = p.category || 'Gear';
        document.getElementById('p-title').innerText = p.name;
        document.getElementById('p-price').innerText = `₹${price.toLocaleString()}`;
        document.getElementById('p-mrp').innerText = `₹${mrp.toLocaleString()}`;
        if (p.description) document.getElementById('p-desc').innerText = p.description;

        const gallery = document.getElementById('image-gallery');
        if (p.images && p.images.length) {
            const thumbHtml = p.images.map((img, idx) =>
                `<div class="thumb ${idx===0?'active':''}" onclick="swapImage('${img}', this)"><img src="${img}"></div>`
            ).join('');
            gallery.innerHTML = `<div class="main-image"><img src="${p.images[0]}" id="main-img"></div><div class="thumbnail-row">${thumbHtml}</div>`;
        } else {
            gallery.innerHTML = `<div class="main-image"><img src="https://via.placeholder.com/800x800" id="main-img"></div>`;
        }

        const sizeGrid = document.getElementById('size-grid');
        if (p.category === 'Footwear') {
            sizeGrid.innerHTML = `
                <button class="size-btn selected" onclick="selectSize(this,'UK 7')">UK 7</button>
                <button class="size-btn" onclick="selectSize(this,'UK 8')">UK 8</button>
                <button class="size-btn" onclick="selectSize(this,'UK 9')">UK 9</button>
                <button class="size-btn" onclick="selectSize(this,'UK 10')">UK 10</button>
            `;
            selectedSize = 'UK 7';
        } else if (p.category === 'Apparel') {
            sizeGrid.innerHTML = `
                <button class="size-btn" onclick="selectSize(this,'S')">S</button>
                <button class="size-btn selected" onclick="selectSize(this,'M')">M</button>
                <button class="size-btn" onclick="selectSize(this,'L')">L</button>
                <button class="size-btn" onclick="selectSize(this,'XL')">XL</button>
            `;
            selectedSize = 'M';
        } else {
            sizeGrid.innerHTML = `<button class="size-btn selected" onclick="selectSize(this,'Standard')">Standard Size</button>`;
            selectedSize = 'Standard';
        }

        const btn = document.getElementById('add-to-cart-btn');
        const isSoldOut = (p.stockStatus === 'out-of-stock');
        if (isSoldOut) {
            btn.innerHTML = '<i class="fas fa-times-circle"></i> Sold Out';
            btn.disabled = true;
            btn.style.background = '#333';
            btn.style.cursor = 'not-allowed';
            btn.style.boxShadow = 'none';
        } else {
            btn.innerHTML = '<i class="fas fa-lock"></i> Secure Item in Cart';
            btn.disabled = false;
            btn.style.background = 'var(--accent)';
        }

        document.getElementById('loader').style.display = 'none';
        document.getElementById('product-content').style.display = 'flex';
    }

    // ============================================================
    //  DOM READY – INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        checkLoginStatus();
        updateCartCount();
        loadProductDetails();

        // Cart button
        const cartBtn = document.getElementById('add-to-cart-btn');
        if (cartBtn) {
            cartBtn.addEventListener('click', function() {
                if (!currentProduct) return;
                if (currentProduct.stockStatus === 'out-of-stock') {
                    showToastMessage('This item is sold out!', false);
                    return;
                }
                if (!localStorage.getItem('rj_loggedInUser')) {
                    window.location.href = `signin.html?redirect=${encodeURIComponent(window.location.href)}`;
                    return;
                }
                let cart = JSON.parse(localStorage.getItem('rj_cart')) || [];
                const idx = cart.findIndex(i => i.productId === currentProduct.productId && i.size === selectedSize);
                if (idx > -1) {
                    cart[idx].quantity += 1;
                } else {
                    cart.push({
                        productId: currentProduct.productId,
                        name: currentProduct.name,
                        price: currentProduct.price,
                        image: currentProduct.images?.[0] || '',
                        size: selectedSize,
                        quantity: 1
                    });
                }
                localStorage.setItem('rj_cart', JSON.stringify(cart));
                updateCartCount();
                showToastMessage('Added to cart', true);
            });
        }

        // Mobile menu
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navLinks = document.getElementById('nav-links');
        if (menuBtn && navLinks) {
            menuBtn.addEventListener('click', function() {
                navLinks.classList.toggle('active');
                menuBtn.innerHTML = navLinks.classList.contains('active') ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
                document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : 'auto';
            });
        }
    });

    // Expose to global scope
    window.selectSize = selectSize;
    window.swapImage = swapImage;
    window.deleteReview = deleteReview;
    window.clearUploadedImage = clearUploadedImage;
    window.submitReview = submitReview;
</script>
</body>
</html>
