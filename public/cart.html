<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Secure Bag | One4Sports</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script>
    // Instantly checks the saved theme from settings
    if(localStorage.getItem('rj_theme') === 'light') {
        document.documentElement.classList.add('light-mode');
    }
</script>
    <style>
 /* BASE THEME (DARK MODE - Default) */
:root { 
    --bg-color: #050505; 
    --text-main: #ffffff;
    --text-muted: #a1a1aa;
    --accent: #ff2a2a; 
    --accent-glow: rgba(255, 42, 42, 0.5);
    --card-bg: #111111;
    --nav-bg: rgba(5, 5, 5, 0.7);
    --border-color: rgba(255, 255, 255, 0.1);
}

/* LIGHT MODE OVERRIDE */
:root.light-mode {
    --bg-color: #f8fafc;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --accent: #E10600;
    --accent-glow: rgba(225, 6, 0, 0.3);
    --card-bg: #ffffff;
    --nav-bg: rgba(255, 255, 255, 0.8);
    --border-color: #e2e8f0;
}
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at top right, rgba(255, 42, 42, 0.05), transparent 40%);
        }

        /* GLASSMORPHIC HEADER */
        .rj-header-wrapper { background: var(--nav-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; width: 100%; z-index: 9999; }
        .rj-navbar { display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; max-width: 1400px; margin: 0 auto; position: relative; }
        .brand-logo { text-decoration: none; font-size: 28px; font-weight: 900; color: var(--text-main); letter-spacing: -1px; text-transform: uppercase; }
        .brand-logo span { color: var(--accent); }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); text-decoration: none; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; width: 150px; }
        .btn-back:hover { color: var(--text-main); transform: translateX(-5px); }
        .nav-spacer { width: 150px; } /* Balances the flexbox */

        /* CART LAYOUT */
        .cart-container { max-width: 1400px; margin: 40px auto 80px; padding: 0 5%; display: flex; gap: 40px; flex: 1; width: 100%; align-items: flex-start; }
        
        /* Left: Items Section */
        .cart-items-section { flex: 2; }
        .cart-header { font-size: 32px; font-weight: 900; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; text-transform: uppercase; letter-spacing: -1px; }
        .cart-header span { color: var(--accent); }
        
        .cart-item { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; margin-bottom: 20px; display: flex; gap: 25px; align-items: center; transition: 0.3s; }
        .cart-item:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .item-img { width: 120px; height: 120px; object-fit: cover; border-radius: 12px; background: #1a1a1a; }
        
        .item-details { flex: 1; display: flex; flex-direction: column; }
        .item-name { font-size: 20px; font-weight: 800; margin-bottom: 8px; line-height: 1.2; text-transform: uppercase; }
        .item-meta { color: var(--text-muted); font-size: 14px; font-weight: 700; margin-bottom: 15px; background: rgba(255,255,255,0.05); width: fit-content; padding: 4px 10px; border-radius: 6px; }
        
        .item-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
        .item-price { font-size: 22px; font-weight: 900; color: var(--text-main); }
        
        /* Quantity Controls */
        .quantity-controls { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 8px; border: 1px solid var(--border-color); }
        .qty-btn { background: transparent; border: none; font-size: 18px; font-weight: 800; cursor: pointer; color: var(--text-muted); width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; border-radius: 6px; transition: 0.2s; }
        .qty-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .qty-num { font-weight: 800; font-size: 16px; width: 30px; text-align: center; }
        
        /* Remove Button */
        .remove-btn { background: rgba(255, 42, 42, 0.1); border: 1px solid transparent; color: var(--accent); cursor: pointer; font-size: 18px; transition: 0.3s; padding: 12px; border-radius: 12px; display: flex; justify-content: center; align-items: center; }
        .remove-btn:hover { background: var(--accent); color: white; box-shadow: 0 0 15px var(--accent-glow); transform: scale(1.05); }

        /* Right: Summary Section */
        .summary-section { flex: 1; position: sticky; top: 100px; }
        .summary-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .summary-title { font-size: 24px; font-weight: 900; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; text-transform: uppercase; letter-spacing: -0.5px; }
        
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 600; color: var(--text-muted); font-size: 16px; }
        .summary-row.total { font-size: 24px; font-weight: 900; color: var(--text-main); border-top: 1px solid var(--border-color); padding-top: 20px; margin-top: 20px; }
        
        .checkout-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 20px; border-radius: 12px; font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; margin-top: 30px; display: flex; justify-content: center; align-items: center; gap: 10px; box-shadow: 0 0 20px var(--accent-glow); }
        .checkout-btn:hover { background: #e10600; transform: translateY(-3px); box-shadow: 0 10px 30px var(--accent-glow); }

        .secure-badge { text-align: center; margin-top: 20px; font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: center; align-items: center; gap: 8px; }

        /* Empty Cart State */
        .empty-cart { text-align: center; padding: 80px 20px; background: var(--card-bg); border: 1px dashed var(--border-color); border-radius: 20px; }
        .empty-cart i { font-size: 60px; color: rgba(255,255,255,0.1); margin-bottom: 25px; }
        .empty-cart h2 { font-size: 28px; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; }
        .empty-cart p { color: var(--text-muted); font-weight: 600; margin-bottom: 30px; font-size: 16px; }
        .btn-explore { display: inline-block; background: var(--text-main); color: var(--bg-color); padding: 16px 32px; border-radius: 50px; text-decoration: none; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-explore:hover { background: var(--accent); color: white; box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-2px); }

        /* MOBILE RESPONSIVE */
        @media (max-width: 992px) {
            .cart-container { flex-direction: column; gap: 40px; }
            .summary-section { width: 100%; position: relative; top: 0; }
        }

        @media (max-width: 768px) {
            .btn-back span { display: none; } /* Hide text on mobile for space */
            .btn-back { width: auto; }
            .nav-spacer { display: none; }
            
            .cart-item { flex-direction: column; align-items: flex-start; position: relative; gap: 15px; }
            .remove-btn { position: absolute; top: 15px; right: 15px; padding: 10px; }
            .item-img { width: 100%; height: 250px; }
            .item-details { width: 100%; }
            .item-bottom { flex-direction: column; align-items: flex-start; gap: 15px; margin-top: 10px; }
            .quantity-controls { width: 100%; justify-content: space-between; }
        }
        /* Modern Left-Aligned Brand Block */
.brand-logo { 
    text-decoration: none; 
    display: flex; 
    flex-direction: column; /* Stacks text under the logo */
    align-items: center; 
    justify-content: center;
    gap: 4px;
    z-index: 10000;
}
.brand-img { 
    height: 75px; /* Larger for better visibility */
    width: auto;
    object-fit: contain;
    justify-content:start
}

.brand-text {
    font-size: 10px; /* Bolder text */
    font-weight: 600;
    color: var(--text-main);
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 0;
}

/* Ensure the navbar keeps the logo in the corner */
.rj-navbar { 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    padding: 10px 1%; 
    max-width: 1400px; 
    margin: 0 auto; 
}
    </style>
</head>
<body>

<header class="rj-header-wrapper">
    <div class="rj-navbar">
        <a href="javascript:history.back()" class="btn-back"><i class="fas fa-arrow-left"></i> <span>Store</span></a>
  <a href="index.html" class="brand-logo">
            <img src="logo.jpg.png" alt="One4Sports" class="brand-img">
            <span class="brand-text">ONE4SPORTS</span>
        </a>
        <div class="nav-spacer"></div>
    </div>
</header>

<div class="cart-container">
    <div class="cart-items-section">
        <div class="cart-header">Your Bag <span>(<span id="item-count">0</span>)</span></div>
        <div id="cart-list">
            </div>
    </div>

    <div class="summary-section" id="summary-container" style="display: none;">
        <div class="summary-card">
            <div class="summary-title">Order Summary</div>
            <div class="summary-row"><span>Subtotal</span><span id="subtotal" style="color: var(--text-main);">₹0</span></div>
            <div class="summary-row"><span>Taxes</span><span>Calculated at checkout</span></div>
            <div class="summary-row"><span>Shipping</span><span style="color: var(--success); font-weight: 800;">FREE</span></div>
            
            <div class="summary-row total"><span>Total</span><span id="total">₹0</span></div>
            
            <button class="checkout-btn" onclick="proceedToCheckout()">
                Secure Checkout <i class="fas fa-lock"></i>
            </button>
            <div class="secure-badge">
                <i class="fas fa-shield-alt"></i> Encrypted & Secure Payment
            </div>
        </div>
    </div>
</div>
<script>
    let cart = JSON.parse(localStorage.getItem('rj_cart')) || []; 

    // Helper: Calculate total based on current cart
    function calculateTotal() {
        return cart.reduce((sum, item) => sum + (Number(item.price) * item.quantity), 0);
    }

    function renderCart() {
        const cartList = document.getElementById('cart-list');
        const summaryContainer = document.getElementById('summary-container');
        document.getElementById('item-count').innerText = cart.length;

        if (cart.length === 0) {
            cartList.innerHTML = `
                <div class="empty-cart">
                    <i class="fas fa-shopping-bag"></i>
                    <h2>Your bag is currently empty</h2>
                    <p>Looks like you haven't secured any gear yet.</p>
                    <a href="index.html" class="btn-explore">Explore Store</a>
                </div>
            `;
            summaryContainer.style.display = 'none';
            return;
        }

        summaryContainer.style.display = 'block';
        cartList.innerHTML = cart.map((item, index) => {
            const imgUrl = item.image || 'https://via.placeholder.com/300x300/111111/ffffff?text=Image';
            return `
                <div class="cart-item">
                    <img src="${imgUrl}" alt="${item.name}" class="item-img" onerror="this.src='https://via.placeholder.com/300x300/111111/ffffff?text=Image'">
                    <div class="item-details">
                        <div class="item-name">${item.name}</div>
                        <div class="item-meta">Size: ${item.size || 'Standard'}</div>
                        <div class="item-bottom">
                            <div class="item-price">₹${Number(item.price).toLocaleString()}</div>
                            <div class="quantity-controls">
                                <button class="qty-btn" onclick="updateQty(${index}, -1)"><i class="fas fa-minus"></i></button>
                                <span class="qty-num">${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQty(${index}, 1)"><i class="fas fa-plus"></i></button>
                            </div>
                        </div>
                    </div>
                    <button class="remove-btn" onclick="removeItem(${index})" title="Remove Item"><i class="fas fa-trash-alt"></i></button>
                </div>
            `;
        }).join('');
        updateSummary();
    }

    function updateQty(index, change) {
        if (cart[index].quantity + change > 0) {
            cart[index].quantity += change;
            saveAndRender();
        } else {
            if(confirm("Remove this item?")) removeItem(index);
        }
    }

    function removeItem(index) { 
        cart.splice(index, 1); 
        saveAndRender(); 
    }

    function updateSummary() {
        const subtotal = calculateTotal();
        document.getElementById('subtotal').innerText = `₹${subtotal.toLocaleString()}`;
        document.getElementById('total').innerText = `₹${subtotal.toLocaleString()}`;
    }

    function saveAndRender() { 
        localStorage.setItem('rj_cart', JSON.stringify(cart)); 
        renderCart(); 
    }

    function proceedToCheckout() { 
        if (!localStorage.getItem('rj_loggedInUser')) {
            window.location.href = 'signin.html?redirect=checkout.html';
        } else {
            window.location.href = 'checkout.html'; 
        }
    }

    window.addEventListener('DOMContentLoaded', renderCart);
</script>
</body>
</html>
